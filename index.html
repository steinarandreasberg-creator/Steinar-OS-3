html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;transition:background .4s,color .3s;}
[data-base="dark"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#1a1438 0%,#0d0b1a 45%,#080612 100%) fixed;}
[data-theme="forest"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#16291e 0%,#0e1a14 45%,#08120c 100%) fixed;}
[data-theme="ocean"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#0f2542 0%,#0a1628 45%,#060f1c 100%) fixed;}
[data-theme="midnight"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#0a1430 0%,#000814 45%,#000206 100%) fixed;}
[data-theme="dracula"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#332840 0%,#1e1a2e 45%,#13101e 100%) fixed;}
[data-theme="noir"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#1a1400 0%,#060606 45%,#000000 100%) fixed;}
[data-theme="ember"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#2d1000 0%,#150800 45%,#080300 100%) fixed;}
[data-theme="aurora"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#082a1a 0%,#041810 45%,#020e08 100%) fixed;}
[data-theme="coffee"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#231508 0%,#120a04 45%,#080400 100%) fixed;}
[data-theme="abyss"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#051525 0%,#030f1c 45%,#010810 100%) fixed;}
#root{height:100%;}

/* ── CARDS ── */
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shad);position:relative;overflow:hidden;}
[data-base="dark"] .card{backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);}
[data-base="dark"] .card::before{content:'';position:absolute;top:0;left:12%;right:12%;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);pointer-events:none;}
[data-base="dark"] .card::after{content:'';position:absolute;top:0;left:0;width:.5px;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent 55%);pointer-events:none;}

/* ── BG LAYERS ── */
.d-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;transition:opacity .5s;}
.d-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;transition:opacity .4s;}
.l-accent{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 0%,rgba(124,58,237,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 90% 90%,rgba(8,145,178,.05) 0%,transparent 70%);transition:opacity .4s;}

/* ── SHARED ── */
input,button,select{font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px;}
.lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-weight:500;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:10px;font-weight:500;border:.5px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;transition:all .14s;user-select:none;}
.dot5{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .14s;font-family:inherit;}
.btn-p{background:var(--acc);color:#fff;}.btn-g{background:transparent;color:var(--t2);border:.5px solid var(--border-s);}.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px;}
.spinner{width:13px;height:13px;border:1.5px solid var(--border-s);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:var(--bg);border:.5px solid var(--border-s);border-radius:20px;box-shadow:var(--shad-lg);padding:32px;width:420px;max-width:95vw;}
.fi{width:100%;padding:10px 14px;border:.5px solid var(--border-s);border-radius:10px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;margin-bottom:14px;transition:border-color .14s;}
.fi:focus{border-color:var(--acc-m);box-shadow:0 0 0 3px var(--acc-l);}
.fl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block;letter-spacing:.04em;}

/* ── ON-PAGE SETTINGS ── */
.settings-bar{
  position:fixed;bottom:24px;right:24px;z-index:900;
  background:var(--bg);border:.5px solid var(--border-s);
  border-radius:16px;box-shadow:var(--shad-lg);
  padding:12px;display:flex;flex-direction:column;gap:8px;
  backdrop-filter:blur(20px);
  animation:fadeUp .4s ease both;
}
[data-base="dark"] .settings-bar{background:rgba(10,8,20,0.85);}
.settings-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:2px;padding:0 2px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.mode-btn{
  padding:7px 12px;border:none;border-radius:10px;cursor:pointer;
  font-size:11px;font-weight:500;transition:all .2s;font-family:inherit;
  background:var(--surface2);color:var(--t2);border:.5px solid var(--border);
  white-space:nowrap;
}
.mode-btn.active{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--acc-l);}
[data-base="dark"] .mode-btn.active{box-shadow:0 2px 16px rgba(139,92,246,.35);}
.settings-divider{height:.5px;background:var(--border-s);margin:2px 0;}
.settings-gear{font-size:10px;color:var(--t3);text-align:center;cursor:pointer;padding:2px;transition:color .14s;}
.settings-gear:hover{color:var(--t2);}

/* ── KEYFRAMES ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:.07;}}
@keyframes charIn{from{opacity:0;transform:translateY(28px) rotate(4deg);}to{opacity:1;transform:translateY(0) rotate(0);}}
@keyframes lineGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes scrollBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(7px);}}
@keyframes glowPulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 30px var(--acc-l);}}

/* ── COMPACT LAYOUT ── */
.compact-root{height:100vh;overflow:hidden;display:flex;flex-direction:column;padding:18px 28px 16px;max-width:1440px;margin:0 auto;position:relative;z-index:1;}
.fu {animation:fadeUp .45s      ease both;}
.fu1{animation:fadeUp .45s .07s ease both;}
.fu2{animation:fadeUp .45s .14s ease both;}
.fu3{animation:fadeUp .45s .22s ease both;}

/* ── IMMERSIVE ── */
.imm-root{height:100vh;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;position:relative;z-index:1;}
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:var(--acc);z-index:999;transition:width .08s linear;transform-origin:left;}
.hero-wrap{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 48px 60px;flex-shrink:0;position:relative;}
.hero-topbar{position:absolute;top:20px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:flex-start;}
.scroll-indicator{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;opacity:.35;animation:scrollBounce 2.2s ease-in-out infinite;}
.widgets-wrap{padding:0 28px 120px;position:relative;}

/* Widget 3D entrance */
.w3d{
  opacity:0;
  transform:perspective(900px) rotateX(-18deg) translateY(70px) scale(.96);
  filter:blur(10px);
  transition:
    opacity .8s cubic-bezier(.16,1,.3,1),
    transform .8s cubic-bezier(.34,1.25,.64,1),
    filter .7s ease;
}
.w3d.in{opacity:1;transform:perspective(900px) rotateX(0) translateY(0) scale(1);filter:blur(0);}
.w3d.d1{transition-delay:.04s;}.w3d.d2{transition-delay:.2s;}.w3d.d3{transition-delay:.36s;}

/* Reveal line */
.rev-line{height:1px;background:linear-gradient(90deg,transparent,var(--acc),var(--teal),transparent);margin-bottom:36px;transform:scaleX(0);transform-origin:left;transition:transform 1.2s cubic-bezier(.4,0,.2,1);}
.rev-line.show{transform:scaleX(1);}

/* Stagger chars */
.stagger-char{display:inline-block;animation:charIn .65s cubic-bezier(.34,1.3,.64,1) both;}

/* ── SETTINGS MODAL ── */
.sett-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:950;display:flex;align-items:center;justify-content:center;animation:fadeUp .22s ease;}
.sett-panel{background:var(--bg);border:.5px solid var(--border-s);border-radius:26px;box-shadow:0 32px 100px rgba(0,0,0,.3);padding:30px;width:360px;max-width:92vw;position:relative;animation:fadeUp .28s cubic-bezier(.16,1,.3,1);}
[data-base="dark"] .sett-panel{background:rgba(7,5,16,0.96);backdrop-filter:blur(40px);}
.sett-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
.sett-title{font-size:16px;font-weight:600;color:var(--text);}
.sett-close{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border-s);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);transition:all .14s;line-height:1;}
.sett-close:hover{color:var(--text);border-color:var(--border-s);background:var(--surface);}
.sett-sec{margin-bottom:22px;}
.sett-sec-label{font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;}
.sett-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sett-btn{padding:11px 14px;border:none;border-radius:13px;cursor:pointer;font-size:12px;font-weight:500;transition:all .18s;font-family:inherit;background:var(--surface2);color:var(--t2);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:7px;}
.sett-btn.on{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 4px 18px var(--acc-l);}
[data-base="dark"] .sett-btn.on{box-shadow:0 4px 22px rgba(139,92,246,.45);}
.sett-divider{height:.5px;background:var(--border);margin:20px 0;}
.sett-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sett-toggle-label{font-size:12px;color:var(--t2);}
.sett-toggle{width:34px;height:18px;border-radius:9px;border:none;padding:0;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
/* ── SETTINGS TRIGGER ── */
.sett-trigger{position:fixed;bottom:26px;right:26px;z-index:900;background:var(--bg);border:.5px solid var(--border-s);border-radius:100px;padding:10px 22px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;font-family:inherit;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:all .22s;display:flex;align-items:center;gap:8px;box-shadow:var(--shad);letter-spacing:.02em;}
.sett-trigger:hover{color:var(--text);box-shadow:var(--shad-lg);transform:translateY(-1px);}
[data-base="dark"] .sett-trigger{background:rgba(7,5,16,0.88);}

/* ── SPINE SECTION ── */
@keyframes shimmer-line{from{transform:translateX(-150%)}to{transform:translateX(150%)}}
@keyframes pulse-skel{0%,100%{opacity:.22}50%{opacity:.55}}
@media(prefers-reduced-motion:reduce){.spine-slot{transition:none!important;filter:none!important;}.spine-track{transition:none!important;}}
.skel-bar{height:11px;background:rgba(255,255,255,.07);border-radius:3px;animation:pulse-skel 1.8s ease-in-out infinite;}
[data-base="light"] .skel-bar{background:rgba(0,0,0,.065);}
.spine-world{position:relative;}
.spine-stage{position:sticky;top:0;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.spine-persp{perspective:1400px;perspective-origin:50% 40%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.spine-track{transform-style:preserve-3d;position:relative;width:1px;height:1px;}
.spine-slot{position:absolute;transform-style:preserve-3d;will-change:transform,opacity;}
.spine-card{background:linear-gradient(160deg,rgba(255,255,255,.075) 0%,rgba(255,255,255,.04) 100%);border:.5px solid rgba(255,255,255,.14);border-radius:20px;backdrop-filter:blur(36px) saturate(140%);-webkit-backdrop-filter:blur(36px) saturate(140%);padding:24px 26px 22px;width:470px;margin-left:-235px;position:relative;overflow:hidden;box-shadow:0 20px 70px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset,0 1px 0 rgba(255,255,255,.1) inset;}
.spine-card::before{content:"";position:absolute;inset:0;border-radius:20px;padding:1px;background:linear-gradient(180deg,var(--card-acc,rgba(255,255,255,.18)) 0%,transparent 35%,transparent 65%,var(--card-acc,rgba(255,255,255,.05)) 100%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.85;}
.spine-card::after{content:"";position:absolute;top:-40%;left:-20%;width:140%;height:60%;background:radial-gradient(ellipse at center,var(--card-glow,transparent) 0%,transparent 65%);pointer-events:none;opacity:.6;filter:blur(20px);}
[data-base="light"] .spine-card{background:linear-gradient(160deg,rgba(255,255,255,.96) 0%,rgba(255,255,255,.88) 100%);border:.5px solid rgba(0,0,0,.07);box-shadow:0 20px 60px rgba(0,0,0,.12),0 1px 0 rgba(255,255,255,1) inset;}
[data-base="light"] .spine-card::after{opacity:.25;}
.spine-lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
.spine-lbl-fav{width:14px;height:14px;border-radius:3px;flex-shrink:0;background:rgba(255,255,255,.08);padding:1px;box-shadow:0 0 0 .5px rgba(255,255,255,.1);}
[data-base="light"] .spine-lbl-fav{background:rgba(0,0,0,.04);box-shadow:0 0 0 .5px rgba(0,0,0,.06);}
.spine-lbl-line{flex:1;height:1px;border-radius:1px;opacity:.4;}
.card-shine{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimmer-line 700ms ease-out forwards;pointer-events:none;}
.snws{display:flex;flex-direction:column;}
.snws-item{padding:9px 0;border-bottom:.5px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:4px;text-decoration:none;color:inherit;cursor:pointer;border-radius:6px;transition:background .13s;position:relative;}
.snws-item:hover{background:rgba(255,255,255,.06);}
[data-base="light"] .snws-item{border-bottom-color:rgba(0,0,0,.06);}
[data-base="light"] .snws-item:hover{background:rgba(0,0,0,.04);}
.snws-item:last-child{border-bottom:none;}
.snws-title{font-size:13px;line-height:1.45;color:var(--text);font-weight:500;text-wrap:pretty;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.snws-meta{font-size:10px;color:var(--t2);display:flex;align-items:center;gap:5px;}
.snws-fav{width:11px;height:11px;border-radius:2px;opacity:.85;flex-shrink:0;}
.snws-more{font-size:9.5px;color:var(--t2);opacity:0;transition:opacity .18s ease;letter-spacing:.5px;margin-top:1px;height:0;overflow:hidden;}
.snws-item:hover .snws-more{opacity:.85;}
.spine-intro-wrap{padding:80px 28px 60px;text-align:center;}
.spine-rule{height:.5px;background:linear-gradient(90deg,transparent,var(--border-s),transparent);margin:0 auto 56px;max-width:480px;}
.spine-nav{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;pointer-events:auto;}
.spine-dot{width:6px;height:6px;border-radius:3px;background:var(--border-s);transition:all .4s cubic-bezier(.34,1.25,.64,1);cursor:pointer;}
.spine-dot.cur{width:20px;background:var(--acc);}

/* ── AI FEEDBACK WIDGET ── */
.ai-fb{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:18px 22px;display:flex;align-items:flex-start;gap:14px;width:100%;max-width:700px;box-shadow:var(--shad);}
[data-base="dark"] .ai-fb{background:rgba(255,255,255,.042);}
.ai-fb-icon{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--acc-l),var(--acc-m));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:var(--acc);margin-top:2px;}
.ai-fb-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;}
.ai-fb-title{font-size:26px;font-weight:600;color:var(--text);line-height:1.15;font-family:"Instrument Serif",serif;font-style:italic;}
.ai-fb-qs{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.ai-fb-q{background:var(--surface2);border:.5px solid var(--border-s);border-radius:20px;padding:6px 14px;font-size:11.5px;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .14s;white-space:nowrap;text-align:left;line-height:1.4;}
.ai-fb-q:hover{background:var(--acc-l);border-color:var(--acc-m);color:var(--acc);}
@keyframes fbCharIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.ai-fb-text{font-size:13px;line-height:1.7;color:var(--t2);}
.ai-fb-actions{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
.ai-fb-action{display:flex;align-items:flex-start;gap:8px;font-size:14.5px;font-weight:500;color:var(--text);line-height:1.45;}
.ai-fb-action-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:5px;}
.ai-fb-reply{display:inline-flex;align-items:center;gap:5px;background:var(--acc-l);border:.5px solid var(--acc-m);color:var(--acc);padding:5px 11px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .13s;flex-shrink:0;margin-top:2px;}
.ai-fb-reply:hover{background:var(--acc-m);color:#fff;}
@keyframes ai-blink{0%,100%{opacity:.25;}50%{opacity:1;}}
.ai-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--t3);animation:ai-blink 1.3s ease-in-out infinite;margin:0 1px;}
.ai-dot:nth-child(2){animation-delay:.22s;}.ai-dot:nth-child(3){animation-delay:.44s;}

/* ── AI CHAT ── */
.ai-chat-wrap{display:flex;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shad-lg);margin:36px 0;}
[data-base="dark"] .ai-chat-wrap{background:rgba(255,255,255,.028);}
.ai-chat-sidebar{width:210px;flex-shrink:0;border-right:.5px solid var(--border);display:flex;flex-direction:column;background:var(--surface2);}
[data-base="dark"] .ai-chat-sidebar{background:rgba(255,255,255,.032);}
.ai-sidebar-head{padding:13px 12px 8px;display:flex;align-items:center;justify-content:space-between;}
.ai-sidebar-lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);}
.ai-new-btn{background:var(--acc);color:#fff;border:none;border-radius:7px;padding:4px 10px;font-size:10.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .13s;}
.ai-new-btn:hover{opacity:.85;}
.ai-conv-list{flex:1;overflow-y:auto;padding:0 6px 8px;}
.ai-conv-item{padding:8px 9px;border-radius:9px;cursor:pointer;transition:background .1s;margin-bottom:2px;}
.ai-conv-item:hover{background:var(--surface);}
.ai-conv-item.act{background:var(--acc-l);border:.5px solid var(--acc-m);}
.ai-conv-title{font-size:11.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.ai-conv-date{font-size:9px;color:var(--t3);margin-top:1px;}
.ai-chat-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.ai-chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.ai-msg{display:flex;gap:9px;align-items:flex-start;}
.ai-msg.usr{flex-direction:row-reverse;}
.ai-bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.65;max-width:76%;}
.ai-bubble.ast{background:var(--surface2);border:.5px solid var(--border);color:var(--text);border-radius:14px 14px 14px 4px;}
.ai-bubble.usr{background:var(--acc);color:#fff;border-radius:14px 14px 4px 14px;}
[data-base="dark"] .ai-bubble.ast{background:rgba(255,255,255,.06);}
.ai-av{width:24px;height:24px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:2px;}
.ai-av.ast{background:linear-gradient(135deg,var(--acc-l),var(--acc-m));color:var(--acc);}
.ai-av.usr{background:var(--surface2);color:var(--t2);}
.ai-chat-foot{border-top:.5px solid var(--border);padding:11px 16px;}
.ai-ref-bar{background:var(--acc-l);border:.5px solid var(--acc-m);border-radius:9px;padding:8px 12px;margin-bottom:9px;display:flex;align-items:flex-start;gap:8px;}
.ai-ref-stripe{width:3px;border-radius:2px;background:var(--acc);flex-shrink:0;align-self:stretch;min-height:16px;}
.ai-ref-text{font-size:11px;color:var(--t2);line-height:1.5;flex:1;}
.ai-ref-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;flex-shrink:0;}
.ai-input-row{display:flex;gap:8px;align-items:flex-end;}
.ai-textarea{flex:1;border:.5px solid var(--border-s);border-radius:11px;padding:9px 13px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;font-family:inherit;resize:none;min-height:38px;max-height:120px;transition:border-color .14s;line-height:1.5;}
.ai-textarea:focus{border-color:var(--acc-m);box-shadow:0 0 0 2px var(--acc-l);}
[data-base="dark"] .ai-textarea{background:rgba(255,255,255,.055);}
.ai-send{width:36px;height:36px;border-radius:10px;background:var(--acc);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .13s;}
.ai-send:disabled{opacity:.35;cursor:default;}
.ai-empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--t3);}
.ai-empty-icon{font-size:28px;opacity:.4;}

/* ── SEARCH BAR ── */
@keyframes dropIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.srch-wrap{position:relative;width:100%;max-width:560px;}
.srch-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:.5px solid var(--border-s);border-radius:14px;padding:11px 16px;box-shadow:var(--shad);transition:border-color .15s,box-shadow .15s,border-radius .15s;}
.srch-box.open,.srch-box:focus-within{border-color:var(--acc-m);box-shadow:0 0 0 3px var(--acc-l);}
.srch-box.open{border-radius:14px 14px 0 0;}
[data-base="dark"] .srch-box{background:rgba(255,255,255,0.055);}
.srch-input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--text);font-family:inherit;}
.srch-input::placeholder{color:var(--t3);}
.srch-clear{background:none;border:none;cursor:pointer;color:var(--t3);padding:0 2px;font-size:16px;line-height:1;display:flex;align-items:center;transition:color .12s;}
.srch-clear:hover{color:var(--t2);}
.srch-drop{position:absolute;left:0;right:0;top:100%;background:var(--surface);border:.5px solid var(--border-s);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;z-index:200;box-shadow:0 10px 28px rgba(0,0,0,.13);animation:dropIn .14s ease both;}

.srch-item{padding:9px 16px;cursor:pointer;font-size:13.5px;color:var(--text);display:flex;align-items:center;gap:10px;transition:background .08s;}
.srch-item:last-child{padding-bottom:12px;}
.srch-item:hover,.srch-item.sel{background:var(--acc-l);}
.srch-icon{color:var(--t3);flex-shrink:0;}

function _startNeural(canvas,mRef,ckRef){
  const ctx=canvas.getContext("2d");
  const W=canvas.width,H=canvas.height;const N=85;
  const pts=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2}));

    const mx=mRef.current.x,my=mRef.current.y;
    pts.forEach(p=>{
      const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=Math.min(230,d)/230;
      p.vx+=(dx/d)*(1-f)*.035;p.vy+=(dy/d)*(1-f)*.035;
      p.vx*=.97;p.vy*=.97;p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;

      for(let j=i+1;j<N;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);

    }
    raf=requestAnimationFrame(tick);
  };
  tick();return()=>cancelAnimationFrame(raf);
}

function _startVortex(canvas,mRef,ckRef){
  const ctx=canvas.getContext("2d");

  const tick=()=>{

// Ripple — expanding rings, click + auto

// Gravity — particles orbiting mouse

// Rain — thin falling streaks

// Pulse — continuous rings from mouse

// Neon — glowing mouse trail
function _startNeon(canvas,mRef){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const trail=[];let hue=180,raf;
  const tick=()=>{
    ctx.clearRect(0,0,W,H);hue=(hue+.35)%360;
    trail.push({x:mRef.current.x,y:mRef.current.y,h:hue});
    if(trail.length>90)trail.shift();
    for(let i=1;i<trail.length;i++){
      const t=trail[i],p=trail[i-1],a=(i/trail.length)*.52;

  };

}
// Waves — horizontal sine lines
function _startWaves(canvas,mRef){
  const ctx=canvas.getContext("2d");const W=canvas.width,H=canvas.height;
  const LINES=9;let t=0,raf;
  const tick=()=>{
    ctx.clearRect(0,0,W,H);t+=0.006;
    const mn=mRef.current.x/W,myn=mRef.current.y/H;
    for(let l=0;l<LINES;l++){
      const yBase=H*(.1+l/(LINES+1)*.85);
      const amp=14+mn*32+l*3.5;
      const freq=.004+l*.0007;
      const spd=.75+l*.22;
      ctx.beginPath();
      for(let x=0;x<=W;x+=4){const y=yBase+amp*Math.sin(x*freq+t*spd+myn*Math.PI);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}

    }
    raf=requestAnimationFrame(tick);
  };
  tick();return()=>cancelAnimationFrame(raf);
}

function BackgroundCanvas({effect}){
  const cvRef=useRef();
  const mRef=useRef({x:window.innerWidth/2,y:window.innerHeight/2});
  const ckRef=useRef({x:0,y:0,age:1});
  useEffect(()=>{
    if(effect==="none")return;
    const canvas=cvRef.current;if(!canvas)return;
    const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};
    resize();window.addEventListener("resize",resize);
    const onMove=e=>{mRef.current={x:e.clientX,y:e.clientY};};
    const onClick=e=>{ckRef.current={x:e.clientX,y:e.clientY,age:0};};
    window.addEventListener("mousemove",onMove);window.addEventListener("click",onClick);
    let cRaf;const ageUp=()=>{ckRef.current.age=Math.min(1,ckRef.current.age+.014);cRaf=requestAnimationFrame(ageUp);};ageUp();
    const S={
      aurora:()=>_startAurora(canvas,mRef),
      neural:()=>_startNeural(canvas,mRef,ckRef),
      vortex:()=>_startVortex(canvas,mRef,ckRef),
      breathe:()=>_startBreathe(canvas,mRef),
      drift:()=>_startDrift(canvas,mRef),
      stars:()=>_startStars(canvas,mRef),
      fireflies:()=>_startFireflies(canvas,mRef),
      ripple:()=>_startRipple(canvas,mRef,ckRef),
      smoke:()=>_startSmoke(canvas,mRef),
      gravity:()=>_startGravity(canvas,mRef),
      rain:()=>_startRain(canvas,mRef),
      pulse:()=>_startPulse(canvas,mRef),
      neon:()=>_startNeon(canvas,mRef),
      waves:()=>_startWaves(canvas,mRef),
    };
    const stop=S[effect]?S[effect]():()=>{};
    return()=>{window.removeEventListener("resize",resize);window.removeEventListener("mousemove",onMove);window.removeEventListener("click",onClick);cancelAnimationFrame(cRaf);stop();};
  },[effect]);
  if(effect==="none")return null;
  return <canvas ref={cvRef} style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}}/>;
}

// ── SCROLL REVEAL HOOK ─────────────────────────────────────────────────
function useReveal(threshold=0.12){const ref=useRef();const[vis,setVis]=useState(false);useEffect(()=>{if(!ref.current)return;const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold});obs.observe(ref.current);return()=>obs.disconnect();},[]);return[ref,vis];}

// ── COUNTER HOOK ───────────────────────────────────────────────────────
function useCounter(target,visible){const[val,setVal]=useState(0);useEffect(()=>{if(!visible||!target)return;const start=Date.now(),dur=1400;const tick=()=>{const p=Math.min((Date.now()-start)/dur,1);const e=1-Math.pow(1-p,3);setVal(Math.round(e*target));if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);},[visible,target]);return val;}

// ── BOOKMARKS ──────────────────────────────────────────────────────────
function Bookmarks({large=false}){
  const[bms,setBms]=useState(()=>{try{const s=localStorage.getItem(LS.BM);return s?JSON.parse(s):DEF_BMS;}catch{return DEF_BMS;}});
  const[adding,setAdding]=useState(false);
  const[lbl,setLbl]=useState("");
  const[url,setUrl]=useState("");
  const[mouseX,setMouseX]=useState(null);
  const lr=useRef();
  const itemRefs=useRef([]);
  const containerRef=useRef();

  const save=n=>{setBms(n);localStorage.setItem(LS.BM,JSON.stringify(n));};
  const add=()=>{const l=lbl.trim(),u=url.trim();if(!l||!u)return;save([...bms,{label:l,url:u.startsWith("http")?u:`https://${u}`,char:l[0].toUpperCase()}]);setLbl("");setUrl("");setAdding(false);};
  useEffect(()=>{if(adding&&lr.current)lr.current.focus();},[adding]);
  useEffect(()=>{const reload=()=>{try{const s=localStorage.getItem(LS.BM);setBms(s?JSON.parse(s):DEF_BMS);}catch{}};window.addEventListener("sos-bm-changed",reload);return()=>window.removeEventListener("sos-bm-changed",reload);},[]);

    const center=rect.left+rect.width/2;
    const dist=Math.abs(mouseX-center);
    const radius=large?150:120;

  };

  const p=large?"14px 16px":"10px 8px",fs=large?13:11,ifs=large?20:16;
  const bs={display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:p,

    <div ref={containerRef}
      style={{display:"flex",gap:large?10:7,flexWrap:"wrap",paddingTop:26,alignItems:"flex-end",overflow:"visible"}}
      onMouseMove={e=>setMouseX(e.clientX)}

    >

        const sc=getDockScale(i);
        return(
          <a key={i} ref={el=>itemRefs.current[i]=el} href={b.url}
            style={{...bs,
              transform:`scale(${sc.toFixed(3)})`,
              transformOrigin:"bottom center",
              transition:mouseX===null?"transform .32s cubic-bezier(.34,1.4,.64,1), border-color .14s, background .14s, color .14s":"transform .08s ease-out, border-color .14s, background .14s, color .14s",
              zIndex:Math.round(sc*10),
              position:"relative",
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--acc-m)";e.currentTarget.style.background="var(--acc-l)";e.currentTarget.style.color="var(--acc)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--surface)";e.currentTarget.style.color="var(--t2)";}}
            onContextMenu={e=>{e.preventDefault();const removed=bms[i];try{const tr=JSON.parse(localStorage.getItem(LS.BMT)||"[]");tr.unshift({...removed,deletedAt:Date.now()});localStorage.setItem(LS.BMT,JSON.stringify(tr.slice(0,50)));}catch{}const n=[...bms];n.splice(i,1);save(n);}}>
            <span style={{fontSize:ifs,fontFamily:"monospace"}}>{b.char}</span>
            <span style={{lineHeight:1.3,height:"2.6em",overflow:"hidden",textAlign:"center",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{b.label}</span>
          </a>
        );
      })}
      {adding?(
        <div style={{display:"flex",gap:6,alignItems:"center",flex:"1 0 200px",background:"var(--surface)",border:".5px solid var(--acc-m)",borderRadius:11,padding:"8px 10px",boxShadow:"0 0 0 3px var(--acc-l)"}}>
          <input ref={lr} value={lbl} onChange={e=>setLbl(e.target.value)} placeholder="Navn" style={{flex:"0 0 70px",border:"none",outline:"none",fontSize:11,background:"transparent",color:"var(--text)"}} onKeyDown={e=>{if(e.key==="Enter")add();if(e.key==="Escape")setAdding(false);}}/>
          <div style={{width:1,height:14,background:"var(--border-s)"}}/>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="URL" style={{flex:1,border:"none",outline:"none",fontSize:11,background:"transparent",color:"var(--text)"}} onKeyDown={e=>{if(e.key==="Enter")add();if(e.key==="Escape")setAdding(false);}}/>
          <button onClick={add} style={{background:"var(--acc)",color:"#fff",border:"none",borderRadius:7,padding:"3px 9px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>+</button>
          <button onClick={()=>setAdding(false)} style={{background:"transparent",border:"none",fontSize:15,color:"var(--t3)",cursor:"pointer"}}>×</button>
        </div>
      ):(

            transform:"scale(1)",transformOrigin:"bottom center",transition:"transform .32s cubic-bezier(.34,1.4,.64,1)"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--acc-m)";e.currentTarget.style.color="var(--acc)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border-s)";e.currentTarget.style.color="var(--t3)";}}>
          +<span style={{fontSize:10}}>Legg til</span>
        </button>
      )}
    </div>
  );
}

function BookmarkTrashModal({onClose}){
  const[trash,setTrash]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS.BMT)||"[]");}catch{return[];}});
  const restore=(bm,idx)=>{
    try{
      const cur=JSON.parse(localStorage.getItem(LS.BM)||"[]");
      const{deletedAt,...clean}=bm;
      cur.push(clean);
      localStorage.setItem(LS.BM,JSON.stringify(cur));
      const next=trash.filter((_,i)=>i!==idx);
      setTrash(next);
      localStorage.setItem(LS.BMT,JSON.stringify(next));
      window.dispatchEvent(new Event("sos-bm-changed"));
    }catch{}
  };
  const removeFromTrash=idx=>{const next=trash.filter((_,i)=>i!==idx);setTrash(next);localStorage.setItem(LS.BMT,JSON.stringify(next));};
  const clearAll=()=>{if(confirm("Tøm hele loggen?")){setTrash([]);localStorage.setItem(LS.BMT,"[]");}};
  return(
    <div className="sett-ov" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="sett-panel" style={{width:420,maxHeight:"80vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
        <div className="sett-head">
          <span className="sett-title">Slettede bokmerker</span>
          <button className="sett-close" onClick={onClose}>×</button>
        </div>
        {trash.length===0?(
          <div style={{color:"var(--t3)",fontSize:13,padding:"30px 0",textAlign:"center"}}>Ingen slettede bokmerker.</div>
        ):(
          <>
            <div style={{flex:1,overflow:"auto",margin:"0 -8px",padding:"0 8px"}}>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {trash.map((b,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 11px",background:"var(--surface2)",border:".5px solid var(--border)",borderRadius:11}}>
                    <span style={{fontSize:16,fontFamily:"monospace",color:"var(--t2)",width:20,textAlign:"center"}}>{b.char||"?"}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.label}</div>
                      <div style={{fontSize:10,color:"var(--t3)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.url}</div>

                  </div>

// ── TIME AGO ──────────────────────────────────────────────────────────
function timeAgo(ds){if(!ds)return"";const m=Math.floor((Date.now()-new Date(ds))/60000);if(m<60)return`${m}m`;const h=Math.floor(m/60);if(h<24)return`${h}t`;return`${Math.floor(h/24)}d`;}

// ── SPINE SCROLL HOOK ─────────────────────────────────────────────────
function useSpineScroll(scrollElRef,wrapperRef){
  const[state,setState]=useState({rot:0,trackY:0});
  const tgtR=useRef(0),curR=useRef(0),tgtY=useRef(0),curY=useRef(0),raf=useRef(null);
  useEffect(()=>{
    const el=scrollElRef?.current;if(!el)return;
    const HOLD=0.10;
    const onScroll=()=>{const w=wrapperRef?.current;if(!w)return;const wTop=w.offsetTop;const scrolled=el.scrollTop-wTop;const total=w.offsetHeight-el.clientHeight;const prog=Math.max(0,Math.min(1,scrolled/total));const p=Math.max(0,(prog-HOLD)/(1-HOLD));tgtR.current=p*340;tgtY.current=p*1000;};
    el.addEventListener("scroll",onScroll,{passive:true});
    const animate=()=>{curR.current+=(tgtR.current-curR.current)*0.05;curY.current+=(tgtY.current-curY.current)*0.05;setState({rot:curR.current,trackY:curY.current});raf.current=requestAnimationFrame(animate);};
    raf.current=requestAnimationFrame(animate);
    return()=>{el.removeEventListener("scroll",onScroll);if(raf.current)cancelAnimationFrame(raf.current);};
  },[]);
  return state;
}

// ── RSS HELPERS ───────────────────────────────────────────────────────
const RSS_TTL=30*60*1000; // 30 min
const domainOf=u=>{try{return new URL(u).hostname.replace(/^www\./,"");}catch{return"";}};
const favOf=d=>d?`https://www.google.com/s2/favicons?domain=${d}&sz=32`:"";
async function cachedRss(key,url,mapFn){
  let stale=null;
  try{
    const raw=localStorage.getItem(key);
    if(raw){
      const c=JSON.parse(raw);
      if(c&&c.t&&Array.isArray(c.items)&&c.items.length){
        if(Date.now()-c.t<RSS_TTL)return{items:c.items,live:true};
        stale=c.items;
      }
    }
  }catch{}
  try{
    const r=await fetch(url);
    if(r.ok){
      const d=await r.json();
      if(d.status==="ok"&&d.items?.length){
        const items=mapFn(d.items);
        try{localStorage.setItem(key,JSON.stringify({t:Date.now(),items}));}catch{}
        return{items,live:true};
      }
    }
  }catch{}
  // Fallback: try allorigins proxy + manual XML parse if rss2json fails
  try{
    const rssUrl=decodeURIComponent((url.match(/rss_url=([^&]+)/)||[])[1]||"");
    if(rssUrl){
      const r2=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`);
      if(r2.ok){
        const txt=await r2.text();
        const doc=new DOMParser().parseFromString(txt,"text/xml");
        const nodes=[...doc.querySelectorAll("item, entry")];
        if(nodes.length){
          const items=mapFn(nodes.map(n=>({
            title:(n.querySelector("title")?.textContent||"").trim(),
            link:(n.querySelector("link")?.getAttribute("href")||n.querySelector("link")?.textContent||"").trim(),
            pubDate:(n.querySelector("pubDate, published, updated")?.textContent||"").trim(),
            description:(n.querySelector("description, summary")?.textContent||"").trim(),
            categories:[...n.querySelectorAll("category")].map(c=>c.textContent.trim()),
          })));
          try{localStorage.setItem(key,JSON.stringify({t:Date.now(),items}));}catch{}
          return{items,live:true};
        }
      }
    }
  }catch{}
  if(stale)return{items:stale,live:true};
  return{items:null,live:false};
}

const GENERIC_QS=[
  {text:"Hva bør jeg fokusere på i neste økt?",fb:false},
  {text:"Hvilken muskelgruppe glemmer jeg å trene?",fb:false},
  {text:"Hva trenger mer hvile akkurat nå?",fb:false},
  {text:"Hva kunne jeg gjort bedre i forrige økt?",fb:false},
  {text:"Hvordan bør jeg tilpasse planen min denne uken?",fb:false},
  {text:"Hvilke muskler er undertrente hos meg?",fb:false},
  {text:"Bør jeg legge inn en ekstra restitusjonsdag?",fb:false},
  {text:"Hva er det svakeste leddet i treningen min?",fb:false},
];

function TypewriterText({text,speed=18,delay=0,style={},className=""}){
  const[shown,setShown]=useState("");
  const[done,setDone]=useState(false);
  const prevText=useRef("");
  useEffect(()=>{
    if(!text||text===prevText.current)return;
    prevText.current=text;
    setShown("");setDone(false);
    let i=0,iv;
    const total=text.length;
    const ms=Math.max(8,Math.min(speed,420/total));
    const to=setTimeout(()=>{iv=setInterval(()=>{i++;setShown(text.slice(0,i));if(i>=total){clearInterval(iv);setDone(true);}},ms);},delay);
    return()=>{clearTimeout(to);clearInterval(iv);};
  },[text]);
  return <span className={className} style={style}>{shown}{!done&&<span style={{opacity:.4}}>▌</span>}</span>;
}

function AIFeedbackWidget({hevyData,calData,onReplyTo,onQuickQuestion}){
  const[data,setData]=useState(()=>{try{const s=localStorage.getItem("sos-ai-fb2");return s?JSON.parse(s):null;}catch{return null;}});
  const[loading,setLoading]=useState(false);
  const[qOffset,setQOffset]=useState(0);
  const prevKey=useRef("");

  const load=useCallback(async(hd,cd)=>{
    if(!hd)return;
    setLoading(true);
    try{
      const r=await fetch("/api/ai-feedback",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({hevyData:hd,calData:cd})});
      const d=await r.json();
      if(d.feedback||d.title){setData(d);localStorage.setItem("sos-ai-fb2",JSON.stringify(d));}
    }catch{}finally{setLoading(false);}
  },[]);

  useEffect(()=>{
    if(!hevyData)return;
    const k=`${hevyData.weeklySessions}-${hevyData.weeklyVol}-${hevyData.lastAt}`;
    if(k===prevKey.current)return;
    prevKey.current=k;
    load(hevyData,calData);
  },[hevyData,calData]);

  // Rotate quick questions every 20s
  useEffect(()=>{
    const id=setInterval(()=>setQOffset(o=>o+1),10000);
    return()=>clearInterval(id);
  },[]);

  const allQs=data?.quickQuestions?.length>=4
    ?data.quickQuestions.map(t=>({text:t,fb:true}))
    :GENERIC_QS;

  // Show 4 at a time, cycling
  const shown4=allQs.length>=4?[0,1,2,3].map(n=>allQs[(qOffset+n)%allQs.length]):allQs;

  const replyText=data?`${data.title||""}\n${data.feedback||""}`.trim():"";

  const handleQ=q=>{
    if(!onQuickQuestion)return;
    onQuickQuestion(q.text, q.fb?replyText:null);
  };

  return(
    <div className="ai-fb">
      <div className="ai-fb-icon">✦</div>
      {loading&&!data?(
        <div className="ai-fb-body"><span><span className="ai-dot"/><span className="ai-dot"/><span className="ai-dot"/></span></div>
      ):!data?(
        <div className="ai-fb-body"><span style={{color:"var(--t3)",fontSize:12}}>Koble til Hevy for AI-tilbakemelding</span></div>
      ):(
        <div className="ai-fb-body">
          {data.title&&<div className="ai-fb-title"><TypewriterText text={data.title} speed={22}/></div>}
          {data.feedback&&<div className="ai-fb-text"><TypewriterText text={data.feedback} speed={14}/></div>}
          {data.actions?.length>0&&(
            <div className="ai-fb-actions">
              {data.actions.map((a,i)=>(
                <div key={i} className="ai-fb-action">
                  <div className="ai-fb-action-dot"/>
                  <TypewriterText text={a} speed={16} delay={i*260}/>
                </div>
              ))}
            </div>
          )}
          {shown4.length>0&&(
            <div className="ai-fb-qs">
              {shown4.map((q,i)=>(
                <button key={`${qOffset}-${i}`} className="ai-fb-q" onClick={()=>handleQ(q)}>
                  {q.text}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
      {data&&onReplyTo&&(
        <button className="ai-fb-reply" onClick={()=>onReplyTo(replyText)}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
          Chat
        </button>
      )}
    </div>
  );
}

// ── AI CHAT SECTION ───────────────────────────────────────────────────
function mdToHtml(t){
  return t
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,'<code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:11px">$1</code>')
    .replace(/^#{1,3} (.+)$/gm,"<strong>$1</strong>")
    .replace(/^[-•] (.+)$/gm,"• $1")
    .replace(/\n\n/g,"<br><br>")
    .replace(/\n/g,"<br>");
}

const CONVS_KEY="sos-ai-convs";
function loadConvs(){try{return JSON.parse(localStorage.getItem(CONVS_KEY)||"[]");}catch{return[];}}
function saveConvs(c){try{localStorage.setItem(CONVS_KEY,JSON.stringify(c));}catch{}}
function fmtConvDate(ts){const d=new Date(ts);const now=new Date();const diff=now-d;if(diff<86400000)return d.toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});if(diff<604800000)return d.toLocaleDateString("no-NO",{weekday:"short"});return d.toLocaleDateString("no-NO",{day:"numeric",month:"short"});}

function AIChatSection({hevyData,calData,replyTo,onClearReplyTo,pendingQuestion,onClearPendingQuestion}){
  const[convs,setConvs]=useState(loadConvs);
  const[activeId,setActiveId]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[sending,setSending]=useState(false);
  const msgsRef=useRef();
  const taRef=useRef();
  const activeIdRef=useRef(activeId);
  useEffect(()=>{activeIdRef.current=activeId;},[activeId]);

  // Load conversation when activeId changes
  useEffect(()=>{
    if(!activeId){setMsgs([]);return;}
    const c=loadConvs().find(x=>x.id===activeId);
    setMsgs(c?.messages||[]);
  },[activeId]);

  // Handle incoming replyTo (from feedback widget)
  useEffect(()=>{
    if(!replyTo)return;
    if(!activeId)newConv();
    taRef.current?.focus();
  },[replyTo]);

  const scrollMsgs=()=>setTimeout(()=>{if(msgsRef.current)msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},50);

  // Direct send (from quick questions) – creates conv if needed
  const sendDirect=useCallback(async(text,context)=>{
    if(!text||sending)return;
    let cid=activeIdRef.current;
    if(!cid){
      const id=String(Date.now());
      const c={id,title:text.slice(0,40),messages:[],createdAt:Date.now()};
      const updated=[c,...loadConvs()];saveConvs(updated);setConvs(updated);setActiveId(id);cid=id;
    }
    const fullText=context?`[Kontekst – tilbakemelding: "${context}"]\n\n${text}`:text;
    const userMsg={role:"user",content:fullText};
    setMsgs(prev=>{
      const nm=[...prev,userMsg];
      const loading={role:"assistant",content:"__loading__"};
      setTimeout(()=>setMsgs(m=>[...m,loading]),0);
      return nm;
    });
    scrollMsgs();
    setSending(true);
    try{
      const curMsgs=loadConvs().find(x=>x.id===cid)?.messages||[];
      const r=await fetch("/api/ai-chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:[...curMsgs,userMsg],hevyData,calData})});
      const d=await r.json();
      const reply=d.reply||d.error||"Noe gikk galt.";
      const astMsg={role:"assistant",content:reply};
      const finalMsgs=[...curMsgs,userMsg,astMsg];
      setMsgs(finalMsgs);
      const updated2=loadConvs().map(c=>c.id===cid?{...c,messages:finalMsgs,title:text.slice(0,40)}:c);
      saveConvs(updated2);setConvs(updated2);
      scrollMsgs();
    }catch(e){
      const err={role:"assistant",content:`Beklager: ${e.message}`};
      setMsgs(prev=>[...prev.filter(m=>m.content!=="__loading__"),err]);
    }finally{setSending(false);}
  },[hevyData,calData,sending]);

  // Handle quick question trigger
  useEffect(()=>{
    if(!pendingQuestion)return;
    if(onClearPendingQuestion)onClearPendingQuestion();
    sendDirect(pendingQuestion.text,pendingQuestion.context);
  },[pendingQuestion]);

  const newConv=()=>{
    const id=String(Date.now());
    const c={id,title:"Ny samtale",messages:[],createdAt:Date.now()};
    const updated=[c,...loadConvs()];
    saveConvs(updated);
    setConvs(updated);
    setActiveId(id);
    setMsgs([]);
  };

  const persistMsgs=(id,messages)=>{
    const updated=loadConvs().map(c=>c.id===id?{...c,messages,title:messages.find(m=>m.role==="user")?.content.slice(0,40)||c.title}:c);
    saveConvs(updated);
    setConvs(updated);
  };

  const send=async()=>{
    const text=input.trim();
    if(!text||sending)return;

    let convId=activeId;
    if(!convId){const id=String(Date.now());const c={id,title:text.slice(0,40),messages:[],createdAt:Date.now()};const updated=[c,...loadConvs()];saveConvs(updated);setConvs(updated);setActiveId(id);convId=id;}

    // Build user message — prepend reply-to reference if set
    const fullText=replyTo?`[Refererer til tilbakemeldingen: "${replyTo}"]\n\n${text}`:text;
    if(onClearReplyTo)onClearReplyTo();
    setInput("");

    const userMsg={role:"user",content:fullText};
    const newMsgs=[...msgs,userMsg];
    setMsgs(newMsgs);
    scrollMsgs();
    setSending(true);

    const loadingMsg={role:"assistant",content:"__loading__"};
    setMsgs(m=>[...m,loadingMsg]);
    scrollMsgs();

    try{
      const r=await fetch("/api/ai-chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:newMsgs,hevyData,calData})});
      const d=await r.json();
      const reply=d.reply||d.error||"Noe gikk galt.";
      const astMsg={role:"assistant",content:reply};
      const finalMsgs=[...newMsgs,astMsg];
      setMsgs(finalMsgs);
      persistMsgs(convId,finalMsgs);
      scrollMsgs();
    }catch(e){
      const err={role:"assistant",content:`Beklager, noe gikk galt: ${e.message}`};
      const finalMsgs=[...newMsgs,err];
      setMsgs(finalMsgs);
      persistMsgs(convId,finalMsgs);
    }finally{setSending(false);}
  };

  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

  const delConv=id=>{
    const updated=loadConvs().filter(c=>c.id!==id);
    saveConvs(updated);
    setConvs(updated);
    if(activeId===id){setActiveId(null);setMsgs([]);}
  };

  const SendIcon=()=>(<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>);

  return(
    <div className="ai-chat-wrap" style={{height:560}}>
      {/* Sidebar */}
      <div className="ai-chat-sidebar">
        <div className="ai-sidebar-head">
          <span className="ai-sidebar-lbl">Samtaler</span>
          <button className="ai-new-btn" onClick={newConv}>+ Ny</button>
        </div>
        <div className="ai-conv-list">
          {convs.length===0&&<div style={{padding:"8px 10px",fontSize:11,color:"var(--t3)"}}>Ingen samtaler ennå</div>}
          {convs.map(c=>(
            <div key={c.id} className={`ai-conv-item${activeId===c.id?" act":""}`}
              onClick={()=>{setActiveId(c.id);}}>
              <div className="ai-conv-title">{c.title}</div>
              <div className="ai-conv-date">{fmtConvDate(c.createdAt)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Main */}
      <div className="ai-chat-main">
        <div ref={msgsRef} className="ai-chat-msgs">
          {!activeId&&(
            <div className="ai-empty-state">
              <div className="ai-empty-icon">✦</div>
              <div style={{fontSize:13,color:"var(--t2)",fontWeight:500}}>AI Treningsassistent</div>
              <div style={{fontSize:11,color:"var(--t3)",textAlign:"center",maxWidth:260}}>Spør om treningen din, anbefalt volum, restitusjonstid, eller neste økt</div>
              <button className="ai-new-btn" style={{marginTop:6}} onClick={newConv}>Start samtale</button>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} className={`ai-msg${m.role==="user"?" usr":""}`}>
              <div className={`ai-av${m.role==="user"?" usr":" ast"}`}>{m.role==="user"?"S":"✦"}</div>
              <div className={`ai-bubble${m.role==="user"?" usr":" ast"}`}>
                {m.content==="__loading__"
                  ?<span><span className="ai-dot"/><span className="ai-dot"/><span className="ai-dot"/></span>
                  :<span dangerouslySetInnerHTML={{__html:mdToHtml(m.content)}}/>}
              </div>
            </div>
          ))}
        </div>

        {/* Footer */}
        {activeId&&(
          <div className="ai-chat-foot">
            {replyTo&&(
              <div className="ai-ref-bar">
                <div className="ai-ref-stripe"/>
                <div className="ai-ref-text">{replyTo}</div>
                <button className="ai-ref-close" onClick={onClearReplyTo}>×</button>
              </div>
            )}
            <div className="ai-input-row">
              <textarea ref={taRef} className="ai-textarea" rows={1} value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={onKey}
                placeholder="Spør om treningen din…"/>
              <button className="ai-send" onClick={send} disabled={sending||!input.trim()}>
                <SendIcon/>
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── SEARCH BAR ────────────────────────────────────────────────────────
function SearchBar(){
  const[q,setQ]=useState("");
  const[suggs,setSuggs]=useState([]);
  const[selIdx,setSelIdx]=useState(-1);
  const[showDrop,setShowDrop]=useState(false);
  const inputRef=useRef();
  const wrapRef=useRef();
  const debRef=useRef();

  // Auto-focus when layout mounts (= when tab opens)
  useEffect(()=>{const t=setTimeout(()=>inputRef.current?.focus(),60);return()=>clearTimeout(t);},[]);

  // Close dropdown on outside click
  useEffect(()=>{
    const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setShowDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  const fetchSuggs=val=>{
    clearTimeout(debRef.current);
    if(!val.trim()){setSuggs([]);setShowDrop(false);return;}
    debRef.current=setTimeout(async()=>{
      try{
        const r=await fetch(`/api/suggest?q=${encodeURIComponent(val)}`);
        const d=await r.json();
        const list=Array.isArray(d)?d:[];
        setSuggs(list);
        setShowDrop(list.length>0);
        setSelIdx(-1);
      }catch{}
    },180);
  };

  const go=val=>{
    const v=(val||"").trim();
    if(!v)return;
    const isUrl=/^(https?:\/\/|[\w-]+\.[\w.-]+(\/|$))/.test(v);
    window.location.href=isUrl?(v.startsWith("http")?v:`https://${v}`):`https://www.google.com/search?q=${encodeURIComponent(v)}`;
  };

  const onChange=e=>{const v=e.target.value;setQ(v);fetchSuggs(v);};
  const onKeyDown=e=>{
    if(e.key==="ArrowDown"){e.preventDefault();setSelIdx(i=>Math.min(i+1,suggs.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setSelIdx(i=>Math.max(i-1,-1));}
    else if(e.key==="Enter"){go(selIdx>=0?suggs[selIdx]:q);}
    else if(e.key==="Escape"){setShowDrop(false);setSelIdx(-1);}
  };
  const clear=()=>{setQ("");setSuggs([]);setShowDrop(false);inputRef.current?.focus();};
  const SearchIcon=({size=15})=>(<svg className="srch-icon" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>);

  return(
    <div ref={wrapRef} className="srch-wrap">
      <div className={`srch-box${showDrop&&suggs.length?" open":""}`}>
        <SearchIcon/>
        <input ref={inputRef} className="srch-input" value={q} onChange={onChange} onKeyDown={onKeyDown}
          onFocus={()=>q&&suggs.length&&setShowDrop(true)}
          placeholder="Søk med Google eller skriv en adresse…"/>
        {q&&<button className="srch-clear" onClick={clear} title="Tøm">✕</button>}
      </div>
      {showDrop&&suggs.length>0&&(
        <div className="srch-drop">
          {suggs.map((s,i)=>(
            <div key={i} className={`srch-item${i===selIdx?" sel":""}`}
              onMouseDown={e=>{e.preventDefault();go(s);}}
              onMouseEnter={()=>setSelIdx(i)}>
              <SearchIcon size={12}/>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SPINE SECTION ─────────────────────────────────────────────────────
const SPINE_WIDGETS=[
  {C:VærSpine,    angle:0,   y:0,   z:440, acc:"rgba(6,182,212,0.6)"},
  {C:NrkSpine,    angle:72,  y:212, z:440, acc:"rgba(244,63,94,0.6)"},
  {C:TreningSpine,angle:144, y:424, z:450, acc:"rgba(139,92,246,0.6)"},
  {C:AiSpine,     angle:216, y:635, z:440, acc:"rgba(251,191,36,0.6)"},
  {C:BbcSpine,    angle:288, y:847, z:435, acc:"rgba(200,200,200,0.4)"},
];

function SpineSection({scrollElRef}){
  const wrapperRef=useRef();
  const {rot,trackY}=useSpineScroll(scrollElRef,wrapperRef);

  // Active widget: closest in BOTH angle AND Y to current camera position
  const activeIdx=SPINE_WIDGETS.reduce((best,w,i)=>{
    const f=((rot-w.angle)%360+360)%360;const a=f>180?f-360:f;
    const dy=w.y-trackY;
    const score=Math.abs(a)/72+Math.abs(dy)/250;
    const fb=((rot-SPINE_WIDGETS[best].angle)%360+360)%360;const ab=fb>180?fb-360:fb;
    const dyb=SPINE_WIDGETS[best].y-trackY;
    const scoreb=Math.abs(ab)/72+Math.abs(dyb)/250;
    return score<scoreb?i:best;
  },0);

  return(
    <div>
      {/* 3D spine world */}
      <div ref={wrapperRef} className="spine-world" style={{height:"700vh"}}>
        <div className="spine-stage">
          {/* Progress dots */}
          <div className="spine-nav">
            {SPINE_WIDGETS.map((_,i)=>(
              <div key={i} className={`spine-dot ${i===activeIdx?"cur":""}`}
                style={{background:i===activeIdx?SPINE_WIDGETS[i].acc.replace("0.5","0.85"):"var(--border-s)"}}/>
            ))}
          </div>

          {/* Widget label */}
          <div style={{position:"absolute",bottom:76,left:0,right:0,textAlign:"center",pointerEvents:"none"}}>
            <div style={{fontSize:8,letterSpacing:"3px",textTransform:"uppercase",color:"var(--t2)",transition:"opacity 0.35s ease"}}>
              {["VÆR · BERGEN","NORSKE NYHETER","TRENINGSNYHETER","AI-NYHETER","VERDEN · BBC"][activeIdx]}
            </div>
          </div>

          <div className="spine-persp">
            {/* Vertical spine column */}
            <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",width:3,height:"70vh",background:`linear-gradient(180deg,transparent 0%,${SPINE_WIDGETS[activeIdx].acc} 30%,${SPINE_WIDGETS[activeIdx].acc} 70%,transparent 100%)`,pointerEvents:"none",transition:"background 0.7s ease",opacity:0.55,zIndex:-1,borderRadius:2,boxShadow:`0 0 18px ${SPINE_WIDGETS[activeIdx].acc}`}}/>

            <div className="spine-track" style={{transform:`rotateY(${-rot}deg)`,zIndex:1,position:"relative"}}>
              {SPINE_WIDGETS.map((w,i)=>{
                const f=((rot-w.angle)%360+360)%360;
                const a=f>180?f-360:f;
                const dy=w.y-trackY;
                // Widget visible only when both angle AND Y-position align
                const angleOp=Math.max(0,1-Math.abs(a)/75);
                const yOp=Math.max(0,1-Math.abs(dy)/260);
                const opacity=angleOp*yOp;
                const scale=0.84+0.16*angleOp*yOp;
                const blurPx=Math.max(0,(1-angleOp*yOp)*6-1);
                return(
                  <div key={i} className="spine-slot" style={{
                    transform:`rotateY(${w.angle}deg) translateY(${w.y-trackY}px) translateZ(${w.z}px) scale(${scale.toFixed(3)})`,
                    opacity,
                    filter:blurPx>0.5?`blur(${blurPx.toFixed(1)}px)`:"none",
                    transition:"opacity 0.04s linear",
                    pointerEvents:opacity>0.18?"auto":"none",
                  }}>
                    {/* translateY(-50%) centres the card on the spine axis */}
                    <div style={{transform:"translateY(-50%)"}}>
                      <w.C/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      <div style={{height:"4vh"}}/>
    </div>
  );
}

// ── IMMERSIVE LAYOUT ───────────────────────────────────────────────────
function ImmersiveLayout(p){
  const g=getGreet(p.now.getHours());
  const ass=p.calData?.assessments||[];
  const scrollRef=useRef();
  const greetRef=useRef();
  const chatRef=useRef();
  const[progress,setProgress]=useState(0);
  const[lineShow,setLineShow]=useState(false);
  const[r1,v1]=useReveal(.1);
  const[r2,v2]=useReveal(.1);
  const[r3,v3]=useReveal(.1);
  const[chatReplyTo,setChatReplyTo]=useState(null);
  const[pendingQuestion,setPendingQuestion]=useState(null);

  useEffect(()=>{
    const el=scrollRef.current;
    if(!el)return;
    const handler=()=>{
      const sy=el.scrollTop,max=el.scrollHeight-el.clientHeight;
      setProgress(max>0?sy/max:0);
      if(greetRef.current)greetRef.current.style.transform=`translateY(${sy*0.3}px)`;
      if(sy>60)setLineShow(true);
    };
    el.addEventListener("scroll",handler,{passive:true});
    return()=>el.removeEventListener("scroll",handler);
  },[]);

  const handleReplyTo=text=>{
    setChatReplyTo(text);
    setTimeout(()=>chatRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),80);
  };

  const handleQuickQuestion=(text,context)=>{
    setPendingQuestion({text,context});
    setTimeout(()=>chatRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),80);
  };

  const greetFontSize="clamp(56px,8.5vw,106px)";

  return(<div ref={scrollRef} className="imm-root">
    {/* Scroll progress bar */}
    <div style={{position:"fixed",top:0,left:0,height:2,width:`${progress*100}%`,background:"linear-gradient(90deg,var(--acc),var(--teal))",zIndex:999,transition:"width .08s linear"}}/>

    {/* Hero */}
    <div className="hero-wrap">
      <div className="hero-topbar">
        <Clock showSeconds={p.showSec}/>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <StatusPills gConn={p.gConn} hevyData={p.hevyData} onGConnect={p.onGConnect} onGDisconn={p.onGDisconn} onSetup={p.onSetup}/>
          <WxCard weather={p.weather}/>
        </div>
      </div>

      {/* Animated greeting */}
      <div ref={greetRef} style={{willChange:"transform",padding:"0 24px",marginTop:16}}>
        <StaggerText text={g.text} fontSize={greetFontSize} delay={0.1} step={0.038}/>
      </div>

      {/* Search bar */}
      <div style={{marginTop:18,width:"100%",maxWidth:560,display:"flex",justifyContent:"center"}}>
        <SearchBar/>
      </div>

      {/* Big bookmarks — extra marginTop absorbed by paddingTop inside Bookmarks for dock effect */}
      <div style={{marginTop:6,width:"100%",maxWidth:880,overflow:"visible"}}><Bookmarks large={true}/></div>

      {/* AI Feedback Widget */}
      <div style={{marginTop:16,width:"100%",maxWidth:700,display:"flex",justifyContent:"center"}}>
        <AIFeedbackWidget hevyData={p.hevyData} calData={p.calData} onReplyTo={handleReplyTo} onQuickQuestion={handleQuickQuestion}/>
      </div>

      {/* Scroll hint */}
      <div className="scroll-indicator">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7" stroke="var(--t3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        <span style={{fontSize:8,color:"var(--t3)",letterSpacing:"2.5px",textTransform:"uppercase"}}>Scroll</span>
      </div>
    </div>

    {/* Widgets section */}
    <div className="widgets-wrap">
      {/* Animated reveal line */}
      <div className={`rev-line ${lineShow?"show":""}`}/>

      {/* Section label that fades in */}
      <div style={{opacity:lineShow?1:0,transition:"opacity .8s .4s ease",marginBottom:24}}>
        <span className="lbl">Dashboard</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr 1fr",gap:11,alignItems:"start"}}>
        <div ref={r1} className={`w3d d1 ${v1?"in":""}`}>
          <TrainingWidget hevyData={p.hevyData} trainingEvents={p.calData?.trainingEvents||[]}/>
        </div>
        <div ref={r2} className={`w3d d2 ${v2?"in":""}`}>
          <HevyWidget hevyData={p.hevyData} loading={p.hevyLoading} error={p.hevyError} onSetup={p.onSetup} animateNumbers={true} visible={v2}/>
        </div>
        <div ref={r3} className={`w3d d3 ${v3?"in":""}`}>
          <AssessWidget assessments={ass} loading={p.calLoading} gConn={p.gConn} onConnect={p.onGConnect} fetchedAt={p.calData?.at}/>
        </div>
      </div>

      {/* AI Chat */}
      <div ref={chatRef}>
        <div style={{marginTop:48,marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
          <span className="lbl">AI Treningsassistent</span>
          <div style={{flex:1,height:".5px",background:"var(--border)"}}/>
        </div>
        <AIChatSection hevyData={p.hevyData} calData={p.calData} replyTo={chatReplyTo} onClearReplyTo={()=>setChatReplyTo(null)} pendingQuestion={pendingQuestion} onClearPendingQuestion={()=>setPendingQuestion(null)}/>
      </div>

      <SpineSection scrollElRef={scrollRef}/>
    </div>
  </div>);
}

// ── APP ────────────────────────────────────────────────────────────────
function App(){
  const[theme,setThemeState]=useState(()=>localStorage.getItem(LS.TH)||"light");
  const[bgEffect,setBgEffectState]=useState(()=>localStorage.getItem(LS.BG)||"none");
  const setBgEffect=v=>{setBgEffectState(v);localStorage.setItem(LS.BG,v);};
  const[showSec,setShowSec]=useState(()=>localStorage.getItem(LS.TW+"sec")==="true");
  const[setupOpen,setSetupOpen]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[showTrash,setShowTrash]=useState(false);
  const[gToken,setGToken]=useState(()=>loadGT());
  const[hevyKey,setHevyKey]=useState(()=>localStorage.getItem(LS.HK)||"");
  const[hevyProxy,setHevyProxy]=useState(()=>localStorage.getItem(LS.HP)||"");
  const[calData,setCalData]=useState(()=>{try{const c=localStorage.getItem(LS.GC);return c?JSON.parse(c):null;}catch{return null;}});
  const[hevyData,setHevyData]=useState(()=>{try{const c=localStorage.getItem(LS.HC);return c?JSON.parse(c):null;}catch{return null;}});
  const[weather,setWeather]=useState(()=>{try{const c=localStorage.getItem(LS.WX);return c?JSON.parse(c):null;}catch{return null;}});
  const[calLoading,setCalLoading]=useState(false);
  const[hevyLoading,setHevyLoading]=useState(false);
  const[hevyError,setHevyError]=useState(null);
  const tcRef=useRef(null);
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(id);},[]);

  const setTheme=t=>{setThemeState(t);localStorage.setItem(LS.TH,t);applyTheme(t);};
  useEffect(()=>{localStorage.setItem(LS.TW+"sec",String(showSec));},[showSec]);
  useEffect(()=>{applyTheme(theme);},[]);

  // Tweaks host
  useEffect(()=>{window.addEventListener("message",e=>{if(e.data?.type==="__activate_edit_mode")setSetupOpen(true);if(e.data?.type==="__deactivate_edit_mode"){}});window.parent.postMessage({type:"__edit_mode_available"},"*");},[]);

  const refreshWx=useCallback(async()=>{try{const w=await fetchWx();setWeather(w);localStorage.setItem(LS.WX,JSON.stringify(w));}catch{}},[]);
  const fetchCalData=useCallback(async token=>{setCalLoading(true);try{const d=await loadCal(token);setCalData(d);localStorage.setItem(LS.GC,JSON.stringify(d));}catch(e){if(e.message?.includes("401")){clearGT();setGToken(null);}}finally{setCalLoading(false);}},[]);
  const fetchHevyData=useCallback(async(k,px)=>{setHevyLoading(true);setHevyError(null);try{const ws=await fetchH(k,px);if(!ws.length){setHevyError("Ingen økter funnet.");setHevyLoading(false);return;}const d=processH(ws);setHevyData(d);localStorage.setItem(LS.HC,JSON.stringify(d));}catch(e){setHevyError(e.message||"Ukjent feil");}finally{setHevyLoading(false);}},[]);
  const initGIS=useCallback(()=>{if(typeof google==="undefined"||tcRef.current)return;tcRef.current=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:tr=>{saveGT(tr);setGToken(tr.access_token);fetchCalData(tr.access_token);}});},[fetchCalData]);

  useEffect(()=>{const t=()=>{if(typeof google!=="undefined"){initGIS();if(gToken)fetchCalData(gToken);}else setTimeout(t,500);};t();},[]);
  useEffect(()=>{fetchHevyData(hevyKey,hevyProxy);},[]);
  useEffect(()=>{const stale=!weather||Date.now()-weather.at>30*60*1000;if(stale)refreshWx();const id=setInterval(refreshWx,30*60*1000);return()=>clearInterval(id);},[]);
  useEffect(()=>{if(!gToken)return;const id=setInterval(()=>{const t=loadGT();if(t)fetchCalData(t);else{clearGT();setGToken(null);}},15*60*1000);return()=>clearInterval(id);},[gToken]);
  useEffect(()=>{const id=setInterval(()=>fetchHevyData(hevyKey,hevyProxy),30*60*1000);return()=>clearInterval(id);},[hevyKey,hevyProxy]);

  const gConnect=()=>{initGIS();if(tcRef.current)tcRef.current.requestAccessToken();};
  const gDisconn=()=>{clearGT();setGToken(null);};
  const saveSettings=(k,px)=>{localStorage.setItem(LS.HK,k);localStorage.setItem(LS.HP,px);setHevyKey(k);setHevyProxy(px);fetchHevyData(k,px);};

  const shared={now,weather,gConn:Boolean(gToken),hevyData,hevyLoading,hevyError,calData,calLoading,onGConnect:gConnect,onGDisconn:gDisconn,onSetup:()=>setSetupOpen(true),onSettings:()=>setShowSettings(true),showSec};

  return(<>
    <BackgroundCanvas effect={bgEffect}/>
    <ImmersiveLayout {...shared}/>
    <button className="sett-trigger" onClick={()=>setShowSettings(true)}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M18.66 5.34l1.41-1.41"/></svg>
      Innstillinger
    </button>
    {showSettings&&<SettingsModal theme={theme} setTheme={setTheme} bgEffect={bgEffect} setBgEffect={setBgEffect} showSec={showSec} setShowSec={setShowSec} onSetup={()=>setSetupOpen(true)} onTrash={()=>setShowTrash(true)} onClose={()=>setShowSettings(false)}/>}
    {showTrash&&<BookmarkTrashModal onClose={()=>setShowTrash(false)}/>}
    <SetupModal open={setupOpen} onClose={()=>setSetupOpen(false)} onSave={saveSettings} initKey={hevyKey} initProxy={hevyProxy}/>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
