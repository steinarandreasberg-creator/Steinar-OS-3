<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steinar OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root,[data-theme="light"]{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,0.07);--border-s:rgba(0,0,0,0.13);
  --text:#111;--t2:rgba(0,0,0,0.5);--t3:rgba(0,0,0,0.28);
  --acc:#7c3aed;--acc-l:rgba(124,58,237,0.09);--acc-m:rgba(124,58,237,0.38);
  --teal:#0891b2;--teal-l:rgba(8,145,178,0.09);
  --green:#16a34a;--green-l:rgba(22,163,74,0.1);
  --amber:#d97706;--amber-l:rgba(217,119,6,0.1);
  --red:#dc2626;--red-l:#fef2f2;
  --shad:0 2px 16px rgba(0,0,0,0.055);--shad-lg:0 8px 32px rgba(0,0,0,0.1);
  --r:16px;--r-s:10px;
  --ck-sz:76px;--ck-w:200;--ck-ls:-5px;--ck-sh:none;
}
[data-theme="dark"]{
  --bg:#0d0b1a;--surface:rgba(255,255,255,0.042);--surface2:rgba(255,255,255,0.065);
  --border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.16);
  --text:rgba(255,255,255,0.95);--t2:rgba(255,255,255,0.52);--t3:rgba(255,255,255,0.34);
  --acc:rgba(149,102,255,1);--acc-l:rgba(139,92,246,0.14);--acc-m:rgba(139,92,246,0.55);
  --teal:rgba(6,182,212,1);--teal-l:rgba(6,182,212,0.12);
  --green:rgba(16,185,129,1);--green-l:rgba(16,185,129,0.12);
  --amber:rgba(251,191,36,1);--amber-l:rgba(251,191,36,0.12);
  --red:rgba(244,63,94,1);--red-l:rgba(244,63,94,0.09);
  --shad:0 2px 20px rgba(0,0,0,0.25);--shad-lg:0 8px 48px rgba(0,0,0,0.45);
  --r:18px;--r-s:12px;
  --ck-sz:92px;--ck-w:100;--ck-ls:-6px;--ck-sh:0 0 80px rgba(149,102,255,0.4);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;transition:background .4s,color .3s;}
[data-theme="dark"] body{background:radial-gradient(ellipse 110% 60% at 50% -10%,#1a1438 0%,#0d0b1a 45%,#080612 100%) fixed;}
#root{height:100%;}

/* ── CARDS ── */
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shad);position:relative;overflow:hidden;}
[data-theme="dark"] .card{backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);}
[data-theme="dark"] .card::before{content:'';position:absolute;top:0;left:12%;right:12%;height:.5px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);pointer-events:none;}
[data-theme="dark"] .card::after{content:'';position:absolute;top:0;left:0;width:.5px;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent 55%);pointer-events:none;}

/* ── BG LAYERS ── */
.d-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;transition:opacity .5s;}
.d-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;transition:opacity .4s;}
.l-accent{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 0%,rgba(124,58,237,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 90% 90%,rgba(8,145,178,.05) 0%,transparent 70%);transition:opacity .4s;}

/* ── SHARED ── */
input,button,select{font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px;}
.lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-weight:500;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:10px;font-weight:500;border:.5px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;transition:all .14s;user-select:none;}
.dot5{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .14s;font-family:inherit;}
.btn-p{background:var(--acc);color:#fff;}.btn-g{background:transparent;color:var(--t2);border:.5px solid var(--border-s);}.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px;}
.spinner{width:13px;height:13px;border:1.5px solid var(--border-s);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:var(--bg);border:.5px solid var(--border-s);border-radius:20px;box-shadow:var(--shad-lg);padding:32px;width:420px;max-width:95vw;}
.fi{width:100%;padding:10px 14px;border:.5px solid var(--border-s);border-radius:10px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;margin-bottom:14px;transition:border-color .14s;}
.fi:focus{border-color:var(--acc-m);box-shadow:0 0 0 3px var(--acc-l);}
.fl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block;letter-spacing:.04em;}

/* ── ON-PAGE SETTINGS ── */
.settings-bar{
  position:fixed;bottom:24px;right:24px;z-index:900;
  background:var(--bg);border:.5px solid var(--border-s);
  border-radius:16px;box-shadow:var(--shad-lg);
  padding:12px;display:flex;flex-direction:column;gap:8px;
  backdrop-filter:blur(20px);
  animation:fadeUp .4s ease both;
}
[data-theme="dark"] .settings-bar{background:rgba(10,8,20,0.85);}
.settings-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:2px;padding:0 2px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.mode-btn{
  padding:7px 12px;border:none;border-radius:10px;cursor:pointer;
  font-size:11px;font-weight:500;transition:all .2s;font-family:inherit;
  background:var(--surface2);color:var(--t2);border:.5px solid var(--border);
  white-space:nowrap;
}
.mode-btn.active{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--acc-l);}
[data-theme="dark"] .mode-btn.active{box-shadow:0 2px 16px rgba(139,92,246,.35);}
.settings-divider{height:.5px;background:var(--border-s);margin:2px 0;}
.settings-gear{font-size:10px;color:var(--t3);text-align:center;cursor:pointer;padding:2px;transition:color .14s;}
.settings-gear:hover{color:var(--t2);}

/* ── KEYFRAMES ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:.07;}}
@keyframes charIn{from{opacity:0;transform:translateY(28px) rotate(4deg);}to{opacity:1;transform:translateY(0) rotate(0);}}
@keyframes lineGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes scrollBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(7px);}}
@keyframes glowPulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 30px var(--acc-l);}}

/* ── COMPACT LAYOUT ── */
.compact-root{height:100vh;overflow:hidden;display:flex;flex-direction:column;padding:18px 28px 16px;max-width:1440px;margin:0 auto;position:relative;z-index:1;}
.fu {animation:fadeUp .45s      ease both;}
.fu1{animation:fadeUp .45s .07s ease both;}
.fu2{animation:fadeUp .45s .14s ease both;}
.fu3{animation:fadeUp .45s .22s ease both;}

/* ── IMMERSIVE ── */
.imm-root{height:100vh;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;position:relative;z-index:1;}
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:var(--acc);z-index:999;transition:width .08s linear;transform-origin:left;}
.hero-wrap{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 48px 60px;flex-shrink:0;position:relative;}
.hero-topbar{position:absolute;top:20px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:flex-start;}
.scroll-indicator{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;opacity:.35;animation:scrollBounce 2.2s ease-in-out infinite;}
.widgets-wrap{padding:0 28px 120px;position:relative;}

/* Widget 3D entrance */
.w3d{
  opacity:0;
  transform:perspective(900px) rotateX(-18deg) translateY(70px) scale(.96);
  filter:blur(10px);
  transition:
    opacity .8s cubic-bezier(.16,1,.3,1),
    transform .8s cubic-bezier(.34,1.25,.64,1),
    filter .7s ease;
}
.w3d.in{opacity:1;transform:perspective(900px) rotateX(0) translateY(0) scale(1);filter:blur(0);}
.w3d.d1{transition-delay:.04s;}.w3d.d2{transition-delay:.2s;}.w3d.d3{transition-delay:.36s;}

/* Reveal line */
.rev-line{height:1px;background:linear-gradient(90deg,transparent,var(--acc),var(--teal),transparent);margin-bottom:36px;transform:scaleX(0);transform-origin:left;transition:transform 1.2s cubic-bezier(.4,0,.2,1);}
.rev-line.show{transform:scaleX(1);}

/* Stagger chars */
.stagger-char{display:inline-block;animation:charIn .65s cubic-bezier(.34,1.3,.64,1) both;}

/* ── SETTINGS MODAL ── */
.sett-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:950;display:flex;align-items:center;justify-content:center;animation:fadeUp .22s ease;}
.sett-panel{background:var(--bg);border:.5px solid var(--border-s);border-radius:26px;box-shadow:0 32px 100px rgba(0,0,0,.3);padding:30px;width:360px;max-width:92vw;position:relative;animation:fadeUp .28s cubic-bezier(.16,1,.3,1);}
[data-theme="dark"] .sett-panel{background:rgba(7,5,16,0.96);backdrop-filter:blur(40px);}
.sett-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
.sett-title{font-size:16px;font-weight:600;color:var(--text);}
.sett-close{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border-s);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);transition:all .14s;line-height:1;}
.sett-close:hover{color:var(--text);border-color:var(--border-s);background:var(--surface);}
.sett-sec{margin-bottom:22px;}
.sett-sec-label{font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;}
.sett-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sett-btn{padding:11px 14px;border:none;border-radius:13px;cursor:pointer;font-size:12px;font-weight:500;transition:all .18s;font-family:inherit;background:var(--surface2);color:var(--t2);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:7px;}
.sett-btn.on{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 4px 18px var(--acc-l);}
[data-theme="dark"] .sett-btn.on{box-shadow:0 4px 22px rgba(139,92,246,.45);}
.sett-divider{height:.5px;background:var(--border);margin:20px 0;}
.sett-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sett-toggle-label{font-size:12px;color:var(--t2);}
.sett-toggle{width:34px;height:18px;border-radius:9px;border:none;padding:0;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
/* ── SETTINGS TRIGGER ── */
.sett-trigger{position:fixed;bottom:26px;right:26px;z-index:900;background:var(--bg);border:.5px solid var(--border-s);border-radius:100px;padding:10px 22px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;font-family:inherit;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:all .22s;display:flex;align-items:center;gap:8px;box-shadow:var(--shad);letter-spacing:.02em;}
.sett-trigger:hover{color:var(--text);box-shadow:var(--shad-lg);transform:translateY(-1px);}
[data-theme="dark"] .sett-trigger{background:rgba(7,5,16,0.88);}

/* ── SPINE SECTION ── */
@keyframes shimmer-line{from{transform:translateX(-150%)}to{transform:translateX(150%)}}
@keyframes pulse-skel{0%,100%{opacity:.22}50%{opacity:.55}}
@media(prefers-reduced-motion:reduce){.spine-slot{transition:none!important;filter:none!important;}.spine-track{transition:none!important;}}
.skel-bar{height:11px;background:rgba(255,255,255,.07);border-radius:3px;animation:pulse-skel 1.8s ease-in-out infinite;}
[data-theme="light"] .skel-bar{background:rgba(0,0,0,.065);}
.spine-world{position:relative;}
.spine-stage{position:sticky;top:0;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.spine-persp{perspective:1400px;perspective-origin:50% 40%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.spine-track{transform-style:preserve-3d;position:relative;width:1px;height:1px;}
.spine-slot{position:absolute;transform-style:preserve-3d;will-change:transform,opacity;}
.spine-card{background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.12);border-radius:18px;backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);padding:22px 24px;width:470px;margin-left:-235px;position:relative;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);}
[data-theme="light"] .spine-card{background:rgba(255,255,255,.92);border:.5px solid rgba(0,0,0,.07);box-shadow:0 16px 50px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,1);}
.spine-lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.spine-lbl-line{flex:1;height:1px;border-radius:1px;opacity:.4;}
.card-shine{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimmer-line 700ms ease-out forwards;pointer-events:none;}
.snws{display:flex;flex-direction:column;}
.snws-item{padding:9px 0;border-bottom:.5px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:4px;text-decoration:none;color:inherit;cursor:pointer;border-radius:6px;transition:background .13s;}
.snws-item:hover{background:rgba(255,255,255,.06);}
[data-theme="light"] .snws-item{border-bottom-color:rgba(0,0,0,.06);}
[data-theme="light"] .snws-item:hover{background:rgba(0,0,0,.04);}
.snws-item:last-child{border-bottom:none;}
.snws-title{font-size:13px;line-height:1.45;color:var(--text);font-weight:500;text-wrap:pretty;}
.snws-meta{font-size:10px;color:var(--t2);}
.spine-intro-wrap{padding:80px 28px 60px;text-align:center;}
.spine-rule{height:.5px;background:linear-gradient(90deg,transparent,var(--border-s),transparent);margin:0 auto 56px;max-width:480px;}
.spine-nav{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;pointer-events:auto;}
.spine-dot{width:6px;height:6px;border-radius:3px;background:var(--border-s);transition:all .4s cubic-bezier(.34,1.25,.64,1);cursor:pointer;}
.spine-dot.cur{width:20px;background:var(--acc);}

/* ── SEARCH BAR ── */
@keyframes dropIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.srch-wrap{position:relative;width:100%;max-width:560px;}
.srch-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:.5px solid var(--border-s);border-radius:14px;padding:11px 16px;box-shadow:var(--shad);transition:border-color .15s,box-shadow .15s,border-radius .15s;}
.srch-box.open,.srch-box:focus-within{border-color:var(--acc-m);box-shadow:0 0 0 3px var(--acc-l);}
.srch-box.open{border-radius:14px 14px 0 0;}
[data-theme="dark"] .srch-box{background:rgba(255,255,255,0.055);}
.srch-input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--text);font-family:inherit;}
.srch-input::placeholder{color:var(--t3);}
.srch-clear{background:none;border:none;cursor:pointer;color:var(--t3);padding:0 2px;font-size:16px;line-height:1;display:flex;align-items:center;transition:color .12s;}
.srch-clear:hover{color:var(--t2);}
.srch-drop{position:absolute;left:0;right:0;top:100%;background:var(--surface);border:.5px solid var(--border-s);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;z-index:200;box-shadow:0 10px 28px rgba(0,0,0,.13);animation:dropIn .14s ease both;}
[data-theme="dark"] .srch-drop{background:rgba(13,10,26,0.98);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);}
.srch-item{padding:9px 16px;cursor:pointer;font-size:13.5px;color:var(--text);display:flex;align-items:center;gap:10px;transition:background .08s;}
.srch-item:last-child{padding-bottom:12px;}
.srch-item:hover,.srch-item.sel{background:var(--acc-l);}
.srch-icon{color:var(--t3);flex-shrink:0;}

/* ── OG MODE OVERRIDES ── */
body[data-og][data-theme="light"],body[data-og]:not([data-theme]){
  --bg:oklch(0.965 0.006 235);--surface:#fff;--surface2:#f3f4f8;
  --border:oklch(0.905 0.008 235);--border-s:oklch(0.945 0.005 235);
  --text:oklch(0.18 0.015 240);--t2:oklch(0.42 0.015 240);--t3:oklch(0.62 0.01 240);
  --acc:oklch(0.52 0.18 260);--acc-l:oklch(0.935 0.04 260);--acc-m:oklch(0.74 0.11 260);
  --teal:oklch(0.52 0.18 195);--teal-l:oklch(0.935 0.04 195);
  --green:oklch(0.52 0.14 165);--green-l:oklch(0.935 0.04 165);
  --amber:oklch(0.62 0.14 70);--amber-l:oklch(0.955 0.04 70);
  --red:oklch(0.54 0.18 22);--red-l:oklch(0.95 0.04 22);
  --shad:0 1px 2px oklch(0 0 0/0.04),0 3px 12px oklch(0 0 0/0.04);
  --shad-lg:0 2px 8px oklch(0 0 0/0.07),0 16px 40px oklch(0 0 0/0.09);
  --r:13px;--r-s:9px;
}
body[data-og][data-theme="dark"]{
  --bg:#0b1120;--surface:rgba(255,255,255,0.055);--surface2:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.09);--border-s:rgba(255,255,255,0.16);
  --text:rgba(255,255,255,0.93);--t2:rgba(255,255,255,0.52);--t3:rgba(255,255,255,0.34);
  --acc:oklch(0.67 0.18 260);--acc-l:rgba(96,165,250,0.12);--acc-m:rgba(96,165,250,0.42);
  --teal:oklch(0.68 0.14 190);--teal-l:rgba(52,211,153,0.12);
  --green:oklch(0.65 0.14 165);--green-l:rgba(52,211,153,0.12);
  --amber:oklch(0.72 0.14 70);--amber-l:rgba(251,191,36,0.12);
  --red:oklch(0.65 0.18 22);--red-l:rgba(244,63,94,0.09);
  --shad:0 2px 16px rgba(0,0,0,0.25);--shad-lg:0 8px 40px rgba(0,0,0,0.4);
  --r:13px;--r-s:9px;
}
body[data-og][data-theme="dark"]{background:radial-gradient(ellipse 100% 50% at 50% 0%,#0f1e3d 0%,#0b1120 55%,#080d18 100%) fixed;}
body[data-og][data-theme="light"]{background:var(--bg);}
</style>
</head>
<body data-theme="light">

function isT(s){if(!s||s.type==="warmup")return false;return(typeof s.reps==="number"&&s.reps>0)||(typeof s.duration_seconds==="number"&&s.duration_seconds>0);}
function gk(t=""){const n=norm(t);if(["squat","deadlift","romanian","rdl","leg ext","leg curl","calf","bulgarian","split squat"].some(k=>n.includes(k)))return"Bein";if(["shoulder press","lateral raise","rear delt","arnold"].some(k=>n.includes(k)))return"Skuldre";if(["pull up","pulldown"," row","shrug","lat "].some(k=>n.includes(k)))return"Rygg";if(["tricep","pushdown","overhead ext"].some(k=>n.includes(k)))return"Triceps";if(["bicep","curl"].some(k=>n.includes(k)))return"Biceps";if(["bench","chest","pec","fly","dip"].some(k=>n.includes(k)))return"Bryst";return null;}
function wv(w){return(w.exercises||[]).reduce((s,ex)=>s+(ex.sets||[]).reduce((ss,set)=>{if(!isT(set)||typeof set.weight_kg!=="number"||typeof set.reps!=="number")return ss;return ss+set.weight_kg*set.reps;},0),0);}

function processH(workouts){if(!workouts.length)return null;const sorted=[...workouts].sort((a,b)=>wts(b)-wts(a));const now=Date.now(),w10=10*86400000;const monday=getMonday(),wk=monday.toISOString().slice(0,10);const weekly=sorted.filter(w=>wts(w)>=monday.getTime());const DOW=["Man","Tir","Ons","Tor","Fre","Lør","Søn"];const wwo={};sorted.forEach(w=>{const d=new Date(wts(w));if(d>=monday&&d<new Date(monday.getTime()+7*86400000)){const idx=d.getDay()===0?6:d.getDay()-1;const day=DOW[idx];if(!wwo[day])wwo[day]={title:w.title||"Økt",type:inferT(w),vol:Math.round(wv(w)),dur:w.start_time&&w.end_time?Math.round((new Date(w.end_time)-new Date(w.start_time))/60000):null};}});const weeklyVol=Math.round(weekly.reduce((s,w)=>s+wv(w),0));const grps={};["Bryst","Rygg","Skuldre","Biceps","Triceps","Bein"].forEach(k=>{grps[k]={sets:0,lastAt:null};});sorted.forEach(w=>{const ts=wts(w);const inW=now-ts<=w10;(w.exercises||[]).forEach(ex=>{const g=gk(ex.title||"");if(!g||!grps[g])return;const sets=(ex.sets||[]).filter(isT).length;if(inW)grps[g].sets+=sets;if(sets>0&&(!grps[g].lastAt||ts>grps[g].lastAt))grps[g].lastAt=ts;});});const muscleGroups=Object.entries(grps).map(([key,v])=>({key,sets:v.sets,daysSince:v.lastAt?Math.floor((now-v.lastAt)/86400000):null}));const recent=sorted.slice(0,3).map(w=>({title:w.title||"Økt",date:w.start_time||w.end_time,dur:w.start_time&&w.end_time?Math.round((new Date(w.end_time)-new Date(w.start_time))/60000):null,vol:Math.round(wv(w))}));return{weeklySessions:weekly.length,weeklyVol,muscleGroups,recent,lastAt:sorted[0]?.start_time||sorted[0]?.end_time||null,wwo,wk};}
async function fetchH(key,proxy){const base=proxy||HPROXY;const all=[];for(let p=1;p<=4;p++){const url=`${base}?page=${p}&pageSize=10`;const headers=(proxy||!key)?{}:{"api-key":key,"accept":"application/json"};try{const r=await fetch(url,{headers});if(!r.ok)break;const d=await r.json();const ws=d.workouts||(Array.isArray(d)?d:[]);all.push(...ws);if(ws.length<10)break;}catch{break;}}return all;}

// ── COUNTER HOOK ───────────────────────────────────────────────────────
function useCounter(target,visible){const[val,setVal]=useState(0);useEffect(()=>{if(!visible||!target)return;const start=Date.now(),dur=1400;const tick=()=>{const p=Math.min((Date.now()-start)/dur,1);const e=1-Math.pow(1-p,3);setVal(Math.round(e*target));if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);},[visible,target]);return val;}

      {ch===" "?"\u00a0":ch}

function Bookmarks({large=false}){const[bms,setBms]=useState(()=>{try{const s=localStorage.getItem(LS.BM);return s?JSON.parse(s):DEF_BMS;}catch{return DEF_BMS;}});const[adding,setAdding]=useState(false);const[lbl,setLbl]=useState(""),  [url,setUrl]=useState("");const lr=useRef();const save=n=>{setBms(n);localStorage.setItem(LS.BM,JSON.stringify(n));};const add=()=>{const l=lbl.trim(),u=url.trim();if(!l||!u)return;save([...bms,{label:l,url:u.startsWith("http")?u:`https://${u}`,char:l[0].toUpperCase()}]);setLbl("");setUrl("");setAdding(false);};useEffect(()=>{if(adding&&lr.current)lr.current.focus();},[adding]);const p=large?"14px 16px":"10px 8px",fs=large?13:11,ifs=large?20:16;const bs={display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:p,background:"var(--surface)",border:".5px solid var(--border)",borderRadius:11,textDecoration:"none",color:"var(--t2)",fontSize:fs,fontWeight:500,transition:"all .14s",flex:"1 0 0",minWidth:60,maxWidth:large?160:120};return(<div style={{display:"flex",gap:large?10:7,flexWrap:"wrap"}}>{bms.map((b,i)=>(<a key={i} href={b.url} style={bs} onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--acc-m)";e.currentTarget.style.background="var(--acc-l)";e.currentTarget.style.color="var(--acc)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--surface)";e.currentTarget.style.color="var(--t2)";}} onContextMenu={e=>{e.preventDefault();const n=[...bms];n.splice(i,1);save(n);}}><span style={{fontSize:ifs,fontFamily:"monospace"}}>{b.char}</span><span>{b.label}</span></a>))}{adding?(<div style={{display:"flex",gap:6,alignItems:"center",flex:"1 0 200px",background:"var(--surface)",border:".5px solid var(--acc-m)",borderRadius:11,padding:"8px 10px",boxShadow:"0 0 0 3px var(--acc-l)"}}><input ref={lr} value={lbl} onChange={e=>setLbl(e.target.value)} placeholder="Navn" style={{flex:"0 0 70px",border:"none",outline:"none",fontSize:11,background:"transparent",color:"var(- function timeAgo(ds){if(!ds)return"";const m=Math.floor((Date.now()-new Date(ds))/60000);if(m<60)return`${m}m`;const h=Math.floor(m/60);if(h<24)return`${h}t`;return`${Math.floor(h/24)}d`;}

// ── SPINE SCROLL HOOK ─────────────────────────────────────────────────
function useSpineScroll(scrollElRef,wrapperRef){
  const[state,setState]=useState({rot:0,trackY:0});
  const tgtR=useRef(0),curR=useRef(0),tgtY=useRef(0),curY=useRef(0),raf=useRef(null);
  useEffect(()=>{
    const el=scrollElRef?.current;if(!el)return;
    const HOLD=0.10;
    const onScroll=()=>{const w=wrapperRef?.current;if(!w)return;const wTop=w.offsetTop;const scrolled=el.scrollTop-wTop;const total=w.offsetHeight-el.clientHeight;const prog=Math.max(0,Math.min(1,scrolled/total));const p=Math.max(0,(prog-HOLD)/(1-HOLD));tgtR.current=p*340;tgtY.current=p*1000;};
    el.addEventListener("scroll",onScroll,{passive:true});
    const animate=()=>{curR.current+=(tgtR.current-curR.current)*0.05;curY.current+=(tgtY.current-curY.current)*0.05;setState({rot:curR.current,trackY:curY.current});raf.current=requestAnimationFrame(animate);};
    raf.current=requestAnimationFrame(animate);
    return()=>{el.removeEventListener("scroll",onScroll);if(raf.current)cancelAnimationFrame(raf.current);};
  },[]);
  return state;
}

// ── SEARCH BAR ────────────────────────────────────────────────────────
function SearchBar(){
  const[q,setQ]=useState("");
  const[suggs,setSuggs]=useState([]);
  const[selIdx,setSelIdx]=useState(-1);
  const[showDrop,setShowDrop]=useState(false);
  const inputRef=useRef();
  const wrapRef=useRef();
  const debRef=useRef();

  // Auto-focus when layout mounts (= when tab opens)
  useEffect(()=>{const t=setTimeout(()=>inputRef.current?.focus(),60);return()=>clearTimeout(t);},[]);

  // Close dropdown on outside click
  useEffect(()=>{
    const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setShowDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  const fetchSuggs=val=>{
    clearTimeout(debRef.current);
    if(!val.trim()){setSuggs([]);setShowDrop(false);return;}
    debRef.current=setTimeout(async()=>{
      try{
        const r=await fetch(`/api/suggest?q=${encodeURIComponent(val)}`);
        const d=await r.json();
        const list=Array.isArray(d)?d:[];
        setSuggs(list);
        setShowDrop(list.length>0);
        setSelIdx(-1);
      }catch{}
    },180);
  };

  const go=val=>{
    const v=(val||"").trim();
    if(!v)return;
    const isUrl=/^(https?:\/\/|[\w-]+\.[\w.-]+(\/|$))/.test(v);
    window.location.href=isUrl?(v.startsWith("http")?v:`https://${v}`):`https://www.google.com/search?q=${encodeURIComponent(v)}`;
  };

  const onChange=e=>{const v=e.target.value;setQ(v);fetchSuggs(v);};
  const onKeyDown=e=>{
    if(e.key==="ArrowDown"){e.preventDefault();setSelIdx(i=>Math.min(i+1,suggs.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setSelIdx(i=>Math.max(i-1,-1));}
    else if(e.key==="Enter"){go(selIdx>=0?suggs[selIdx]:q);}
    else if(e.key==="Escape"){setShowDrop(false);setSelIdx(-1);}
  };
  const clear=()=>{setQ("");setSuggs([]);setShowDrop(false);inputRef.current?.focus();};
  const SearchIcon=({size=15})=>(<svg className="srch-icon" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>);

  return(
    <div ref={wrapRef} className="srch-wrap">
      <div className={`srch-box${showDrop&&suggs.length?" open":""}`}>
        <SearchIcon/>
        <input ref={inputRef} className="srch-input" value={q} onChange={onChange} onKeyDown={onKeyDown}
          onFocus={()=>q&&suggs.length&&setShowDrop(true)}
          placeholder="Søk med Google eller skriv en adresse…"/>
        {q&&<button className="srch-clear" onClick={clear} title="Tøm">✕</button>}
      </div>
      {showDrop&&suggs.length>0&&(
        <div className="srch-drop">
          {suggs.map((s,i)=>(
            <div key={i} className={`srch-item${i===selIdx?" sel":""}`}
              onMouseDown={e=>{e.preventDefault();go(s);}}
              onMouseEnter={()=>setSelIdx(i)}>
              <SearchIcon size={12}/>
              {s}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SPINE SECTION ─────────────────────────────────────────────────────
const SPINE_WIDGETS=[
  {C:VærSpine,    angle:0,   y:0,   z:440, acc:"rgba(6,182,212,0.6)"},
  {C:NrkSpine,    angle:72,  y:212, z:440, acc:"rgba(244,63,94,0.6)"},
  {C:TreningSpine,angle:144, y:424, z:450, acc:"rgba(139,92,246,0.6)"},
  {C:AiSpine,     angle:216, y:635, z:440, acc:"rgba(251,191,36,0.6)"},
  {C:BbcSpine,    angle:288, y:847, z:435, acc:"rgba(200,200,200,0.4)"},
];

function SpineSection({scrollElRef}){
  const wrapperRef=useRef();
  const {rot,trackY}=useSpineScroll(scrollElRef,wrapperRef);

  // Active widget: closest in BOTH angle AND Y to current camera position
  const activeIdx=SPINE_WIDGETS.reduce((best,w,i)=>{
    const f=((rot-w.angle)%360+360)%360;const a=f>180?f-360:f;
    const dy=w.y-trackY;
    const score=Math.abs(a)/72+Math.abs(dy)/250;
    const fb=((rot-SPINE_WIDGETS[best].angle)%360+360)%360;const ab=fb>180?fb-360:fb;
    const dyb=SPINE_WIDGETS[best].y-trackY;
    const scoreb=Math.abs(ab)/72+Math.abs(dyb)/250;
    return score<scoreb?i:best;
  },0);

  return(
    <div>
      {/* 3D spine world */}
      <div ref={wrapperRef} className="spine-world" style={{height:"700vh"}}>
        <div className="spine-stage">
          {/* Progress dots */}
          <div className="spine-nav">
            {SPINE_WIDGETS.map((_,i)=>(
              <div key={i} className={`spine-dot ${i===activeIdx?"cur":""}`}
                style={{background:i===activeIdx?SPINE_WIDGETS[i].acc.replace("0.5","0.85"):"var(--border-s)"}}/>
            ))}
          </div>

          {/* Widget label */}
          <div style={{position:"absolute",bottom:76,left:0,right:0,textAlign:"center",pointerEvents:"none"}}>
            <div style={{fontSize:8,letterSpacing:"3px",textTransform:"uppercase",color:"var(--t2)",transition:"opacity 0.35s ease"}}>
              {["VÆR · BERGEN","NORSKE NYHETER","TRENINGSNYHETER","AI-NYHETER","VERDEN · BBC"][activeIdx]}
            </div>
          </div>

          <div className="spine-persp">
            {/* Vertical spine column */}
            <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",width:3,height:"70vh",background:`linear-gradient(180deg,transparent 0%,${SPINE_WIDGETS[activeIdx].acc} 30%,${SPINE_WIDGETS[activeIdx].acc} 70%,transparent 100%)`,pointerEvents:"none",transition:"background 0.7s ease",opacity:0.55,zIndex:-1,borderRadius:2,boxShadow:`0 0 18px ${SPINE_WIDGETS[activeIdx].acc}`}}/>

            <div className="spine-track" style={{transform:`rotateY(${-rot}deg)`,zIndex:1,position:"relative"}}>
              {SPINE_WIDGETS.map((w,i)=>{
                const f=((rot-w.angle)%360+360)%360;
                const a=f>180?f-360:f;
                const dy=w.y-trackY;
                // Widget visible only when both angle AND Y-position align
                const angleOp=Math.max(0,1-Math.abs(a)/75);
                const yOp=Math.max(0,1-Math.abs(dy)/260);
                const opacity=angleOp*yOp;
                const scale=0.84+0.16*angleOp*yOp;
                const blurPx=Math.max(0,(1-angleOp*yOp)*6-1);
                return(
                  <div key={i} className="spine-slot" style={{
                    transform:`rotateY(${w.angle}deg) translateY(${w.y-trackY}px) translateZ(${w.z}px) scale(${scale.toFixed(3)})`,
                    opacity,
                    filter:blurPx>0.5?`blur(${blurPx.toFixed(1)}px)`:"none",
                    transition:"opacity 0.04s linear",
                    pointerEvents:opacity>0.18?"auto":"none",
                  }}>
                    {/* translateY(-50%) centres the card on the spine axis */}
                    <div style={{transform:"translateY(-50%)"}}>
                      <w.C/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      <div style={{height:"4vh"}}/>
    </div>
  );
}

// ── IMMERSIVE LAYOUT ───────────────────────────────────────────────────
function ImmersiveLayout(p){
  const g=getGreet(p.now.getHours());
  const ass=p.calData?.assessments||[];
  const scrollRef=useRef();
  const greetRef=useRef();
  const lineRef=useRef();
  const[progress,setProgress]=useState(0);
  const[lineShow,setLineShow]=useState(false);
  const[r1,v1]=useReveal(.1);
  const[r2,v2]=useReveal(.1);
  const[r3,v3]=useReveal(.1);

  useEffect(()=>{
    const el=scrollRef.current;
    if(!el)return;
    const handler=()=>{
      const sy=el.scrollTop,max=el.scrollHeight-el.clientHeight;
      setProgress(max>0?sy/max:0);
      if(greetRef.current)greetRef.current.style.transform=`translateY(${sy*0.3}px)`;
      if(sy>60)setLineShow(true);
    };
    el.addEventListener("scroll",handler,{passive:true});
    return()=>el.removeEventListener("scroll",handler);
  },[]);

  const greetFontSize="clamp(62px,9.5vw,118px)";

  return(<div ref={scrollRef} className="imm-root">
    {/* Scroll progress bar */}
    <div style={{position:"fixed",top:0,left:0,height:2,width:`${progress*100}%`,background:"linear-gradient(90deg,var(--acc),var(--teal))",zIndex:999,transition:"width .08s linear"}}/>

    {/* Hero */}
    <div className="hero-wrap">
      <div className="hero-topbar">
        <Clock showSeconds={p.showSec}/>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <StatusPills gConn={p.gConn} hevyData={p.hevyData} onGConnect={p.onGConnect} onGDisconn={p.onGDisconn} onSetup={p.onSetup}/>
          <WxCard weather={p.weather}/>
        </div>
      </div>

      {/* Animated greeting */}
      <div ref={greetRef} style={{willChange:"transform",padding:"0 24px",marginTop:20}}>
        <StaggerText text={`${g.emoji} ${g.text}`} fontSize={greetFontSize} delay={0.1} step={0.038}/>
      </div>

      {/* Search bar */}
      <div style={{marginTop:30,width:"100%",maxWidth:560,display:"flex",justifyContent:"center"}}>
        <SearchBar/>
      </div>

      {/* Big bookmarks */}
      <div style={{marginTop:32,width:"100%",maxWidth:880}}><Bookmarks large={true}/></div>

      {/* Scroll hint */}
      <div className="scroll-indicator">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7" stroke="var(--t3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        <span style={{fontSize:8,color:"var(--t3)",letterSpacing:"2.5px",textTransform:"uppercase"}}>Scroll</span>
      </div>
    </div>

    {/* Widgets section */}
    <div className="widgets-wrap">
      {/* Animated reveal line */}
      <div className={`rev-line ${lineShow?"show":""}`}/>

      {/* Section label that fades in */}
      <div style={{opacity:lineShow?1:0,transition:"opacity .8s .4s ease",marginBottom:24}}>
        <span className="lbl">Dashboard</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1.5fr 1fr",gap:11,alignItems:"start"}}>
        <div ref={r1} className={`w3d d1 ${v1?"in":""}`}>
          <TrainingWidget hevyData={p.hevyData} trainingEvents={p.calData?.trainingEvents||[]}/>
        </div>
        <div ref={r2} className={`w3d d2 ${v2?"in":""}`}>
          <HevyWidget hevyData={p.hevyData} loading={p.hevyLoading} error={p.hevyError} onSetup={p.onSetup} animateNumbers={true} visible={v2}/>
        </div>
        <div ref={r3} className={`w3d d3 ${v3?"in":""}`}>
          <AssessWidget assessments={ass} loading={p.calLoading} gConn={p.gConn} onConnect={p.onGConnect} fetchedAt={p.calData?.at}/>
        </div>
      </div>
      <SpineSection scrollElRef={scrollRef}/>
    </div>
  </div>);
}

// ── OG LAYOUT ─────────────────────────────────────────────────────────
function OGLayout(p){
  const g=getGreet(p.now.getHours());
  const ass=p.calData?.assessments||[];
  const nextAss=ass[0];
  const nextDays=nextAss?daysUntil(nextAss.date):null;
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",padding:"20px 28px 16px",maxWidth:1400,margin:"0 auto",overflow:"hidden",position:"relative",zIndex:1}}>
      {/* TOP BAR */}
      <div className="fu" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
        <Clock showSeconds={p.showSec}/>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            <div style={{display:"flex",gap:5}}>
              <StatusPills gConn={p.gConn} hevyData={p.hevyData} onGConnect={p.onGConnect} onGDisconn={p.onGDisconn} onSetup={p.onSetup}/>
              <div className="pill" onClick={p.onSettings} style={{cursor:"pointer"}}>Innstillinger</div>
            </div>
            {nextAss&&nextDays!==null&&nextDays<=5&&(
              <div className="pill" style={{background:"var(--red-l)",borderColor:"var(--red)",color:"var(--red)",fontWeight:600}}>
                {nextAss.subjectKey} om {nextDays} {nextDays===1?"dag":"dager"}
              </div>
            )}
          </div>
          <WxCard weather={p.weather}/>
        </div>
      </div>
      {/* HERO GREETING */}
      <div className="fu1" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:"0 40px",minHeight:60,gap:22}}>
        <div style={{fontFamily:"Instrument Serif,serif",fontStyle:"italic",fontSize:"clamp(48px,5.5vw,76px)",letterSpacing:"-1px",color:"var(--text)",lineHeight:1.1}}>
          {g.emoji} {g.text}
        </div>
        <SearchBar/>
      </div>
      {/* BOOKMARKS */}
      <div className="fu2" style={{flexShrink:0,marginBottom:12}}><Bookmarks/></div>
      {/* WIDGETS */}
      <div className="fu3" style={{flexShrink:0,display:"grid",gridTemplateColumns:"1fr 1.4fr 1fr",gap:12,alignItems:"start"}}>
        <TrainingWidget hevyData={p.hevyData} trainingEvents={p.calData?.trainingEvents||[]}/>
        <HevyWidget hevyData={p.hevyData} loading={p.hevyLoading} error={p.hevyError} onSetup={p.onSetup}/>
        <AssessWidget assessments={ass} loading={p.calLoading} gConn={p.gConn} onConnect={p.onGConnect} fetchedAt={p.calData?.at}/>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────
function App(){
  const[theme,setThemeState]=useState(()=>localStorage.getItem(LS.TH)||"light");
  const[viewMode,setViewModeState]=useState(()=>{const v=localStorage.getItem(LS.SC);return(v==="scroll"||v==="game"||v==="og")?v:"compact";});
  const[showSec,setShowSec]=useState(()=>localStorage.getItem(LS.TW+"sec")==="true");
  const[setupOpen,setSetupOpen]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[gToken,setGToken]=useState(()=>loadGT());
  const[hevyKey,setHevyKey]=useState(()=>localStorage.getItem(LS.HK)||"");
  const[hevyProxy,setHevyProxy]=useState(()=>localStorage.getItem(LS.HP)||"");
  const[calData,setCalData]=useState(()=>{try{const c=localStorage.getItem(LS.GC);return c?JSON.parse(c):null;}catch{return null;}});
  const[hevyData,setHevyData]=useState(()=>{try{const c=localStorage.getItem(LS.HC);return c?JSON.parse(c):null;}catch{return null;}});
  const[weather,setWeather]=useState(()=>{try{const c=localStorage.getItem(LS.WX);return c?JSON.parse(c):null;}catch{return null;}});
  const[calLoading,setCalLoading]=useState(false);
  const[hevyLoading,setHevyLoading]=useState(false);
  const[hevyError,setHevyError]=useState(null);
  const tcRef=useRef(null);
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(id);},[]);

  const setTheme=t=>{setThemeState(t);localStorage.setItem(LS.TH,t);applyTheme(t);};
  const setViewMode=v=>{setViewModeState(v);localStorage.setItem(LS.SC,v);};
  useEffect(()=>{localStorage.setItem(LS.TW+"sec",String(showSec));},[showSec]);
  useEffect(()=>{applyTheme(theme);},[]);
  useEffect(()=>{if(viewMode==="og")document.body.setAttribute("data-og","true");else document.body.removeAttribute("data-og");},[viewMode]);

  // Tweaks host
  useEffect(()=>{window.addEventListener("message",e=>{if(e.data?.type==="__activate_edit_mode")setSetupOpen(true);if(e.data?.type==="__deactivate_edit_mode"){}});window.parent.postMessage({type:"__edit_mode_available"},"*");},[]);

  const refreshWx=useCallback(async()=>{try{const w=await fetchWx();setWeather(w);localStorage.setItem(LS.WX,JSON.stringify(w));}catch{}},[]);
  const fetchCalData=useCallback(async token=>{setCalLoading(true);try{const d=await loadCal(token);setCalData(d);localStorage.setItem(LS.GC,JSON.stringify(d));}catch(e){if(e.message?.includes("401")){clearGT();setGToken(null);}}finally{setCalLoading(false);}},[]);
  const fetchHevyData=useCallback(async(k,px)=>{setHevyLoading(true);setHevyError(null);try{const ws=await fetchH(k,px);if(!ws.length){setHevyError("Ingen økter funnet.");setHevyLoading(false);return;}const d=processH(ws);setHevyData(d);localStorage.setItem(LS.HC,JSON.stringify(d));}catch(e){setHevyError(e.message||"Ukjent feil");}finally{setHevyLoading(false);}},[]);
  const initGIS=useCallback(()=>{if(typeof google==="undefined"||tcRef.current)return;tcRef.current=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:tr=>{saveGT(tr);setGToken(tr.access_token);fetchCalData(tr.access_token);}});},[fetchCalData]);

  useEffect(()=>{const t=()=>{if(typeof google!=="undefined"){initGIS();if(gToken)fetchCalData(gToken);}else setTimeout(t,500);};t();},[]);
  useEffect(()=>{fetchHevyData(hevyKey,hevyProxy);},[]);
  useEffect(()=>{const stale=!weather||Date.now()-weather.at>30*60*1000;if(stale)refreshWx();const id=setInterval(refreshWx,30*60*1000);return()=>clearInterval(id);},[]);
  useEffect(()=>{if(!gToken)return;const id=setInterval(()=>{const t=loadGT();if(t)fetchCalData(t);else{clearGT();setGToken(null);}},15*60*1000);return()=>clearInterval(id);},[gToken]);
  useEffect(()=>{const id=setInterval(()=>fetchHevyData(hevyKey,hevyProxy),30*60*1000);return()=>clearInterval(id);},[hevyKey,hevyProxy]);

  const gConnect=()=>{initGIS();if(tcRef.current)tcRef.current.requestAccessToken();};
  const gDisconn=()=>{clearGT();setGToken(null);};
  const saveSettings=(k,px)=>{localStorage.setItem(LS.HK,k);localStorage.setItem(LS.HP,px);setHevyKey(k);setHevyProxy(px);fetchHevyData(k,px);};

  const shared={now,weather,gConn:Boolean(gToken),hevyData,hevyLoading,hevyError,calData,calLoading,onGConnect:gConnect,onGDisconn:gDisconn,onSetup:()=>setSetupOpen(true),onSettings:()=>setShowSettings(true),showSec};

  return(<>
    {viewMode==="scroll"?<ImmersiveLayout {...shared}/>:viewMode==="game"?<GameLayout {...shared}/>:viewMode==="og"?<OGLayout {...shared}/>:<CompactLayout {...shared}/>}
    <button className="sett-trigger" onClick={()=>setShowSettings(true)}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M18.66 5.34l1.41-1.41"/></svg>
      Innstillinger
    </button>
    {showSettings&&<SettingsModal theme={theme} setTheme={setTheme} viewMode={viewMode} setViewMode={setViewMode} showSec={showSec} setShowSec={setShowSec} onSetup={()=>setSetupOpen(true)} onClose={()=>setShowSettings(false)}/>}
    <SetupModal open={setupOpen} onClose={()=>setSetupOpen(false)} onSave={saveSettings} initKey={hevyKey} initProxy={hevyProxy}/>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
