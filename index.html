<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: oklch(0.965 0.006 235);
  --surface: #ffffff;
  --border: oklch(0.905 0.008 235);
  --border-subtle: oklch(0.945 0.005 235);
  --text: oklch(0.18 0.015 240);
  --text-2: oklch(0.42 0.015 240);
  --text-3: oklch(0.62 0.01 240);
  --blue: oklch(0.52 0.18 260);
  --blue-light: oklch(0.935 0.04 260);
  --blue-mid: oklch(0.74 0.11 260);
  --green: oklch(0.52 0.14 165);
  --green-light: oklch(0.935 0.04 165);
  --amber: oklch(0.62 0.14 70);
  --amber-light: oklch(0.955 0.04 70);
  --red: oklch(0.54 0.18 22);
  --red-light: oklch(0.95 0.04 22);
  --purple: oklch(0.55 0.18 300);
  --purple-light: oklch(0.945 0.04 300);
  --radius: 13px;
  --shadow: 0 1px 2px oklch(0 0 0 / 0.04), 0 3px 12px oklch(0 0 0 / 0.04);
  --shadow-lg: 0 2px 8px oklch(0 0 0 / 0.07), 0 16px 40px oklch(0 0 0 / 0.09);
}
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
#root { height: 100%; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
input, button, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,100% { opacity: 0.35; } 50% { opacity: 0.12; } }
.fade-up   { animation: fadeUp 0.45s ease both; }
.fade-up-1 { animation: fadeUp 0.45s 0.06s ease both; }
.fade-up-2 { animation: fadeUp 0.45s 0.12s ease both; }
.fade-up-3 { animation: fadeUp 0.45s 0.18s ease both; }
.fade-up-4 { animation: fadeUp 0.45s 0.24s ease both; }
.fade-up-5 { animation: fadeUp 0.45s 0.30s ease both; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
.modal-overlay { position: fixed; inset: 0; background: oklch(0 0 0 / 0.35); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow-lg); padding: 32px; width: 440px; max-width: 95vw; }
.modal-title { font-family: 'Instrument Serif', serif; font-size: 22px; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text-3); margin-bottom: 24px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; display: block; letter-spacing: 0.03em; }
.field-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); outline: none; margin-bottom: 16px; transition: border-color 0.15s; }
.field-input:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px var(--blue-light); }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: oklch(0.47 0.18 260); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.tweaks-panel { position: fixed; bottom: 20px; right: 20px; width: 256px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 16px; z-index: 150; display: none; animation: fadeUp 0.2s ease; }
.tweaks-panel.open { display: block; }
.tweak-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.tweak-label { font-size: 12px; color: var(--text-2); }
.tweak-select { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); font-family: inherit; cursor: pointer; }
.toggle { width: 36px; height: 20px; border-radius: 10px; border: none; background: var(--border); cursor: pointer; position: relative; transition: background 0.2s; padding: 0; flex-shrink: 0; }
.toggle.on { background: var(--blue); }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: white; transition: transform 0.18s; }
.toggle.on::after { transform: translateX(16px); }
.status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; cursor: pointer; transition: all 0.15s; user-select: none; }
.status-pill:hover { filter: brightness(0.95); }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CLIENT_ID = "317129810780-q75l1ktememfqqf5brtqdmf8gldj5ctf.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
const SCHOOL_CAL_ID  = "1a01f59babef9d2303244482713dd84435a44cc33e01b47803e747c1ad708b1c@group.calendar.google.com";
const TRENING_CAL_ID = "452cafe832a573c8c5ebca1fd61f4a7466fdc8c5540fda2b6b650d4715fcff60@group.calendar.google.com";
const LOPE_CAL_ID    = "3a78ac1763a08d01a473bc950e2cb44a8a27e3b69e37febab5d4e0c9a881fe82@group.calendar.google.com";
const SUBJECTS = {
  Matte: { color: "#60a5fa" }, Fysikk: { color: "#a78bfa" },
  Biologi: { color: "#34d399" }, Spansk: { color: "#fb923c" },
  Norsk: { color: "#f472b6" }, Økonomi: { color: "#facc15" },
  Historie: { color: "#94a3b8" }, Annet: { color: "#64748b" },
};
const BOOKMARKS = [
  { label: "Claude", url: "https://claude.ai", char: "✦" },
  { label: "Visma", url: "https://nordahlgrieg-vgs.inschool.visma.no/Login.jsp#/", char: "◈" },
  { label: "Viaplay", url: "https://viaplay.no", char: "▶" },
  { label: "ChatGPT", url: "https://chatgpt.com", char: "⬡" },
];
const LS = {
  GTOKEN: "steinar-gtoken-v2",
  HEVY_KEY: "steinar-hevy-key",
  HEVY_PROXY: "steinar-hevy-proxy",
  HEVY_CACHE: "steinar-hevy-cache-v2",
  GCAL_CACHE: "steinar-gcal-cache-v2",
  TRAINING_PLAN: "steinar-training-plan-v2",
  TWEAKS: "steinar-tweaks-v2",
};
const TWEAK_DEFAULTS = { showSeconds: false, accent: "blue" };
const DEFAULT_HEVY_PROXY = "/api/hevy";

// ── AUTH ───────────────────────────────────────────────────────────────────────
function saveGToken(tr) {
  const expiry = Date.now() + (tr.expires_in - 120) * 1000;
  localStorage.setItem(LS.GTOKEN, JSON.stringify({ token: tr.access_token, expiry }));
}
function loadGToken() {
  try { const d = JSON.parse(localStorage.getItem(LS.GTOKEN)||"{}"); if (d.token && d.expiry > Date.now()) return d.token; } catch {}
  return null;
}
function clearGToken() { localStorage.removeItem(LS.GTOKEN); }

// ── UTILS ──────────────────────────────────────────────────────────────────────
function norm(t="") { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function includesAny(t,kws) { return kws.some(k=>t.includes(k)); }
function daysUntil(ds) { const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((new Date(ds)-t)/86400000); }
function fmtDate(ds) { return new Date(ds).toLocaleDateString("nb-NO",{day:"numeric",month:"short"}); }
function fmtTime(ds) { return new Date(ds).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"}); }
const WEEKDAYS=["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
const MONTHS=["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

function findSubject(text="") {
  const n=norm(text);
  if (n.includes("okonomi")) return "Økonomi";
  if (n.includes("matte")||n.includes("r1")||n.includes("r2")) return "Matte";
  if (n.includes("fysikk")) return "Fysikk";
  if (n.includes("biologi")) return "Biologi";
  if (n.includes("spansk")) return "Spansk";
  if (n.includes("norsk")) return "Norsk";
  if (n.includes("historie")) return "Historie";
  return null;
}

// ── CALENDAR ───────────────────────────────────────────────────────────────────
async function fetchCalEvents(token,calId,timeMin,timeMax) {
  const items=[]; let pt="";
  do {
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?singleEvents=true&orderBy=startTime&timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&maxResults=250`+(pt?`&pageToken=${encodeURIComponent(pt)}`:"");
    const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
    if (!res.ok) throw new Error(`Cal ${res.status}`);
    const data=await res.json();
    items.push(...(data.items||[])); pt=data.nextPageToken||"";
  } while(pt);
  return items;
}

async function loadCalendarData(token) {
  const now=new Date();
  const tMin=new Date(now); tMin.setDate(tMin.getDate()-1);
  const tMax=new Date(now); tMax.setDate(tMax.getDate()+90);
  const tMaxW=new Date(now); tMaxW.setDate(tMaxW.getDate()+14);
  const [schoolR,treningR,lopeR]=await Promise.allSettled([
    fetchCalEvents(token,SCHOOL_CAL_ID,tMin.toISOString(),tMax.toISOString()),
    fetchCalEvents(token,TRENING_CAL_ID,tMin.toISOString(),tMaxW.toISOString()),
    fetchCalEvents(token,LOPE_CAL_ID,tMin.toISOString(),tMaxW.toISOString()),
  ]);
  const school=schoolR.status==="fulfilled"?schoolR.value:[];
  const trening=treningR.status==="fulfilled"?treningR.value:[];
  const lope=lopeR.status==="fulfilled"?lopeR.value:[];

  const assessments=school
    .filter(i=>i.colorId==="11"&&(i.start?.date||i.start?.dateTime)&&i.status!=="cancelled")
    .map(i=>({ id:i.id, date:i.start?.date||i.start?.dateTime?.slice(0,10), subject:i.summary||"Vurdering", subjectKey:findSubject([i.summary,i.description].filter(Boolean).join(" "))||"Annet" }))
    .filter(i=>daysUntil(i.date)>=0).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,10);

  const trainingEvents=[
    ...trening.map(i=>{ if(i.status==="cancelled") return null; const dt=i.start?.dateTime||i.start?.date; return dt?{id:i.id,title:i.summary||"Trening",dateStr:dt,isAllDay:Boolean(i.start?.date&&!i.start?.dateTime),source:"trening"}:null; }),
    ...lope.map(i=>{ if(i.status==="cancelled") return null; const dt=i.start?.dateTime||i.start?.date; return dt?{id:i.id,title:i.summary||"Løping",dateStr:dt,isAllDay:Boolean(i.start?.date&&!i.start?.dateTime),source:"løpe"}:null; }),
  ].filter(Boolean).sort((a,b)=>new Date(a.dateStr)-new Date(b.dateStr)).slice(0,10);

  return { assessments, trainingEvents, fetchedAt: Date.now() };
}

// ── HEVY ───────────────────────────────────────────────────────────────────────
function isTrackedSet(s) { if(!s||s.type==="warmup") return false; return (typeof s.reps==="number"&&s.reps>0)||(typeof s.duration_seconds==="number"&&s.duration_seconds>0); }
function getGroupKey(title="") {
  const n=norm(title);
  if (["squat","deadlift","romanian","rdl","leg ext","leg curl","calf","bulgarian","split squat"].some(k=>n.includes(k))) return "Bein";
  if (["shoulder press","lateral raise","rear delt","arnold"].some(k=>n.includes(k))) return "Skuldre";
  if (["pull up","pulldown"," row","shrug","lat "].some(k=>n.includes(k))) return "Rygg";
  if (["tricep","pushdown","overhead ext"].some(k=>n.includes(k))) return "Triceps";
  if (["bicep","curl"].some(k=>n.includes(k))) return "Biceps";
  if (["bench","chest","pec","fly","dip"].some(k=>n.includes(k))) return "Bryst";
  return null;
}
function workoutVol(w) { return (w.exercises||[]).reduce((s,ex)=>s+(ex.sets||[]).reduce((ss,set)=>{ if(!isTrackedSet(set)||typeof set.weight_kg!=="number"||typeof set.reps!=="number") return ss; return ss+set.weight_kg*set.reps; },0),0); }
function workoutTs(w) { const v=w?.start_time||w?.end_time; const t=v?new Date(v).getTime():NaN; return Number.isFinite(t)?t:0; }

function inferWorkoutType(w) {
  const t=norm(w.title||"");
  if (t.includes("push")) return "Push";
  if (t.includes("pull")) return "Pull";
  if (t.includes("leg")||t.includes("bein")) return "Legs";
  if (t.includes("chest")&&t.includes("back")) return "Chest & Back";
  if (t.includes("shoulder")||t.includes("arm")) return "S & Arms";
  if (["løp","run","jogg","sprint","interval"].some(k=>t.includes(k))) return "Løping";
  const g={}; (w.exercises||[]).forEach(ex=>{ const gk=getGroupKey(ex.title||""); if(gk) g[gk]=(g[gk]||0)+1; });
  const bein=(g.Bein||0),push=(g.Bryst||0)+(g.Skuldre||0)+(g.Triceps||0),pull=(g.Rygg||0)+(g.Biceps||0);
  if (bein>=3) return "Legs"; if (push>pull+2) return "Push"; if (pull>push+2) return "Pull";
  if (push>0&&pull>0) return "Chest & Back";
  return w.title||"Økt";
}

function processWorkouts(workouts) {
  if (!workouts.length) return null;
  const sorted=[...workouts].sort((a,b)=>workoutTs(b)-workoutTs(a));
  const now=Date.now(), week7=7*86400000, month28=28*86400000, win10=10*86400000;
  const weekly=sorted.filter(w=>now-workoutTs(w)<=week7);
  const monthly=sorted.filter(w=>now-workoutTs(w)<=month28);
  const DOW=["Man","Tir","Ons","Tor","Fre","Lør","Søn"];
  const monday=new Date(); monday.setHours(0,0,0,0); monday.setDate(monday.getDate()-(monday.getDay()===0?6:monday.getDay()-1));
  const weekWorkouts={};
  sorted.forEach(w=>{ const d=new Date(workoutTs(w)); if(d>=monday&&d<new Date(monday.getTime()+7*86400000)){ const idx=d.getDay()===0?6:d.getDay()-1; const day=DOW[idx]; if(!weekWorkouts[day]) weekWorkouts[day]={title:w.title||"Økt",type:inferWorkoutType(w),vol:Math.round(workoutVol(w)),duration:w.start_time&&w.end_time?Math.round((new Date(w.end_time)-new Date(w.start_time))/60000):null}; } });
  const weeklyVol=Math.round(weekly.reduce((s,w)=>s+workoutVol(w),0));
  const groups={}; ["Bryst","Rygg","Skuldre","Biceps","Triceps","Bein"].forEach(k=>{ groups[k]={sets:0,lastAt:null}; });
  sorted.forEach(w=>{ const ts=workoutTs(w); const inWin=now-ts<=win10; (w.exercises||[]).forEach(ex=>{ const g=getGroupKey(ex.title||""); if(!g||!groups[g]) return; const sets=(ex.sets||[]).filter(isTrackedSet).length; if(inWin) groups[g].sets+=sets; if(sets>0&&(!groups[g].lastAt||ts>groups[g].lastAt)) groups[g].lastAt=ts; }); });
  const muscleGroups=Object.entries(groups).map(([key,v])=>({ key,sets:v.sets,daysSince:v.lastAt?Math.floor((now-v.lastAt)/86400000):null }));
  const recent=sorted.slice(0,4).map(w=>({ title:w.title||"Økt",date:w.start_time||w.end_time,duration:w.start_time&&w.end_time?Math.round((new Date(w.end_time)-new Date(w.start_time))/60000):null,vol:Math.round(workoutVol(w)),exCount:(w.exercises||[]).length }));
  return { weeklySessions:weekly.length,weeklyVol,muscleGroups,recent,lastAt:sorted[0]?.start_time||sorted[0]?.end_time||null,weekWorkouts };
}

async function fetchHevy(apiKey,proxyUrl) {
  const base=proxyUrl||DEFAULT_HEVY_PROXY; const all=[];
  for (let p=1;p<=4;p++) {
    const url=`${base}?page=${p}&pageSize=10`;
    const headers=(proxyUrl||!apiKey)?{}:{"api-key":apiKey,"accept":"application/json"};
    try { const res=await fetch(url,{headers}); if(!res.ok) break; const data=await res.json(); const ws=data.workouts||(Array.isArray(data)?data:[]); all.push(...ws); if(ws.length<10) break; } catch { break; }
  }
  return all;
}

// ── GREETING ───────────────────────────────────────────────────────────────────
function getGreeting(hour) {
  if (hour < 5)  return { text:"Sover du ikke, Steinar?",        emoji:"🌑" };
  if (hour < 7)  return { text:"Tidlig ute, Steinar!",            emoji:"🌅" };
  if (hour < 10) return { text:"God morgen, Steinar.",            emoji:"☀️"  };
  if (hour < 12) return { text:"Klar for en ny runde, Steinar?",  emoji:"🌤"  };
  if (hour < 14) return { text:"Spis noe skikkelig, Steinar.",    emoji:"🥗"  };
  if (hour < 17) return { text:"Treningssekken pakket, Steinar?", emoji:"⚡"  };
  if (hour < 20) return { text:"Fortjent pause, Steinar.",        emoji:"🌇"  };
  if (hour < 22) return { text:"Ro ned, Steinar.",                emoji:"🌙"  };
  return           { text:"Legg deg snart, Steinar.",             emoji:"💤"  };
}

// ── CLOCK (compact — only time + date) ────────────────────────────────────────
function Clock({ showSeconds }) {
  const [now,setNow]=useState(new Date());
  useEffect(()=>{ const id=setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(id); },[]);
  const h=String(now.getHours()).padStart(2,"0"), m=String(now.getMinutes()).padStart(2,"0"), s=String(now.getSeconds()).padStart(2,"0");
  const day=WEEKDAYS[now.getDay()];
  return (
    <div>
      <div style={{ fontFamily:"Instrument Serif,serif", fontSize:52, letterSpacing:"-2px", display:"flex", alignItems:"baseline", gap:1, color:"var(--text)", lineHeight:1 }}>
        {h}<span style={{ animation:"blink 1s step-end infinite", opacity:0.3 }}>:</span>{m}
        {showSeconds&&<span style={{ fontSize:22, opacity:0.4, marginLeft:3 }}>{s}</span>}
      </div>
      <div style={{ fontSize:11, color:"var(--text-3)", marginTop:2, letterSpacing:"0.01em" }}>
        {day.charAt(0).toUpperCase()+day.slice(1)} {now.getDate()}. {MONTHS[now.getMonth()]}
      </div>
    </div>
  );
}

// ── SEARCH ─────────────────────────────────────────────────────────────────────
function SearchBar() {
  const [q,setQ]=useState("");
  const go=e=>{ e.preventDefault(); if(q.trim()) window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`,"_self"); };
  return (
    <form onSubmit={go} style={{ position:"relative" }}>
      <svg style={{ position:"absolute",left:15,top:"50%",transform:"translateY(-50%)",color:"var(--text-3)",pointerEvents:"none" }} width="15" height="15" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" strokeWidth="1.5"/>
        <path d="M10 10L13.5 13.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
      </svg>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Søk på Google..."
        style={{ width:"100%",height:44,paddingLeft:40,paddingRight:16,fontSize:14,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:22,outline:"none",color:"var(--text)",boxShadow:"var(--shadow)",transition:"border-color .15s,box-shadow .15s" }}
        onFocus={e=>{ e.target.style.borderColor="var(--blue-mid)"; e.target.style.boxShadow="0 0 0 3px var(--blue-light),var(--shadow)"; }}
        onBlur={e=>{ e.target.style.borderColor="var(--border)"; e.target.style.boxShadow="var(--shadow)"; }}
      />
    </form>
  );
}

// ── BOOKMARKS ──────────────────────────────────────────────────────────────────
function Bookmarks() {
  return (
    <div style={{ display:"flex", gap:7 }}>
      {BOOKMARKS.map(b=>(
        <a key={b.url} href={b.url} target="_blank" rel="noreferrer"
          style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:"10px 6px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:11,textDecoration:"none",color:"var(--text-2)",fontSize:11,fontWeight:500,transition:"all .15s" }}

  const mergeHevy=base=>{ if(!hevyData?.weekWorkouts) return base; return base.map(d=>{ const a=hevyData.weekWorkouts[d.day]; return (a&&!d.manualOverride)?{...d,done:true,actualType:a.type,actualTitle:a.title,fromHevy:true}:d; }); };
  const [plan,setPlan]=useState(()=>{ try{ const k=getWeekKey(); const s=localStorage.getItem(LS.TRAINING_PLAN); const data=s?JSON.parse(s):null; if(data?.weekKey===k) return mergeHevy(data.plan); }catch{} return mergeHevy(DEFAULT_PLAN); });
  useEffect(()=>{ if(!hevyData?.weekWorkouts) return; setPlan(prev=>{ const next=prev.map(d=>{ const a=hevyData.weekWorkouts[d.day]; return (a&&!d.manualOverride)?{...d,done:true,actualType:a.type,actualTitle:a.title,fromHevy:true}:d; }); localStorage.setItem(LS.TRAINING_PLAN,JSON.stringify({weekKey:getWeekKey(),plan:next})); return next; }); },[hevyData]);

  const done=plan.filter(d=>d.done&&d.type!=="Hvile").length, total=plan.filter(d=>d.type!=="Hvile").length;
  const DAYS=["Søn","Man","Tir","Ons","Tor","Fre","Lør"];

          const al=col==="green"?"var(--green-light)":col==="blue"?"var(--blue-light)":col==="purple"?"var(--purple-light)":"var(--bg)";
          const isToday=DAYS[new Date().getDay()]===d.day;

          return (

function useNow(interval) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), interval); return () => clearInterval(id); }, [interval]);
  return now;
}

function countdownStr(dateStr, now) {
  const target = new Date(dateStr + "T00:00:00");
  const diff = target - now;
  if (diff <= 0) return "I dag";
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if (d > 0) return `${d}d ${h}t ${m}m ${s}s`;
  if (h > 0) return `${h}t ${m}m ${s}s`;
  return `${m}m ${s}s`;
}

  useEffect(()=>{ const try_=()=>{ if(typeof google!=="undefined"){ initGIS(); if(gToken) fetchCalendar(gToken); }else{ setTimeout(try_,500); } }; try_(); },[]);
  useEffect(()=>{ fetchHevyData(hevyKey,hevyProxy); },[]);
  useEffect(()=>{ if(!gToken) return; const id=setInterval(()=>{ const t=loadGToken(); if(t) fetchCalendar(t); else{ clearGToken(); setGToken(null); } },15*60*1000); return()=>clearInterval(id); },[gToken]);
  useEffect(()=>{ const id=setInterval(()=>fetchHevyData(hevyKey,hevyProxy),30*60*1000); return()=>clearInterval(id); },[hevyKey,hevyProxy]);

  const googleConnect=()=>{ initGIS(); if(tokenClientRef.current) tokenClientRef.current.requestAccessToken(); };
  const googleDisconnect=()=>{ clearGToken(); setGToken(null); };
  const saveHevySettings=(key,proxy)=>{ localStorage.setItem(LS.HEVY_KEY,key); localStorage.setItem(LS.HEVY_PROXY,proxy); setHevyKeyState(key); setHevyProxy(proxy); fetchHevyData(key,proxy); };

  const googleConnected=Boolean(gToken);
  const assessments=calData?.assessments||[];
  const nextAssessment=assessments[0];
  const greeting=getGreeting(now.getHours());

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", padding:"20px 28px 16px", maxWidth:1400, margin:"0 auto" }}>

      {/* TOP BAR */}
      <div className="fade-up" style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexShrink:0, marginBottom:0 }}>
        <Clock showSeconds={tweaks.showSeconds}/>
        <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:6, alignItems:"flex-end" }}>
            <div style={{ display:"flex", gap:6 }}>
              <div className="status-pill" onClick={googleConnected?googleDisconnect:googleConnect}
                style={{ background:googleConnected?"var(--green-light)":"var(--bg)",border:`1px solid ${googleConnected?"oklch(0.83 0.08 165)":"var(--border)"}`,color:googleConnected?"var(--green)":"var(--text-3)" }}>
                <div className="dot" style={{ background:googleConnected?"var(--green)":"var(--text-3)" }}/>{googleConnected?"Google":"Koble til Google"}
              </div>
              <div className="status-pill" onClick={()=>setSetupOpen(true)}
                style={{ background:hevyData?"var(--blue-light)":"var(--bg)",border:`1px solid ${hevyData?"oklch(0.83 0.08 260)":"var(--border)"}`,color:hevyData?"var(--blue)":"var(--text-3)" }}>
                <div className="dot" style={{ background:hevyData?"var(--blue)":"var(--text-3)" }}/>{hevyData?"Hevy":"Koble til Hevy"}
              </div>
              <div className="status-pill" onClick={()=>setSetupOpen(true)} style={{ background:"var(--bg)",border:"1px solid var(--border)",color:"var(--text-3)" }}>
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M6.5 1h3l.5 2 1.5.87 2-.5L15 5.5l-1.5 1.5v1L15 9.5l-1.5 2.13-2-.5L10 12l-.5 2h-3L6 12l-1.5-.87-2 .5L1 9.5l1.5-1.5v-1L1 5.5l1.5-2.13 2 .5L6 3l.5-2z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/><circle cx="8" cy="8" r="2" stroke="currentColor" strokeWidth="1.2"/></svg>
                Innstillinger
              </div>
            </div>
            {nextAssessment&&<div style={{ fontSize:12,background:"var(--amber-light)",border:"1px solid oklch(0.86 0.08 70)",borderRadius:20,padding:"3px 11px",color:"var(--amber)",fontWeight:500 }}>📝 {nextAssessment.subjectKey} om {daysUntil(nextAssessment.date)} dager</div>}
          </div>
          {/* Weather */}
          <a href="https://www.yr.no/nb/v%C3%A6rvarsel/daglig-tabell/1-92810/Norge/Vestland/Bergen/Nesttun" target="_blank" rel="noreferrer"
            className="card"
            style={{ padding:"12px 14px",width:140,display:"flex",flexDirection:"column",justifyContent:"space-between",textDecoration:"none",cursor:"pointer",transition:"box-shadow .15s",gap:4 }}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="var(--shadow-lg)"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="var(--shadow)"}
          >
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
              <div>
                <div style={{ fontSize:10,color:"var(--text-3)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em" }}>Nesttun</div>
                <div style={{ fontFamily:"Instrument Serif,serif",fontSize:32,lineHeight:1.1,marginTop:1,color:"var(--text)" }}>8°</div>
              </div>
              <span style={{ fontSize:24 }}>⛅</span>
            </div>
            <div style={{ fontSize:10,color:"var(--text-3)" }}>Delvis skyet · ↑12° ↓3°</div>
          </a>
        </div>
      </div>

      {/* HERO GREETING */}
      <div className="fade-up-1" style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 40px" }}>
        <div style={{ fontFamily:"Instrument Serif,serif", fontStyle:"italic", fontSize:"clamp(42px, 5vw, 68px)", letterSpacing:"-1px", color:"var(--text)", lineHeight:1.1 }}>
          {greeting.emoji} {greeting.text}
        </div>
      </div>

      {/* SEARCH */}
      <div className="fade-up-2" style={{ flexShrink:0, marginBottom:9 }}><SearchBar/></div>

      {/* BOOKMARKS */}
      <div className="fade-up-2" style={{ flexShrink:0, marginBottom:12 }}><Bookmarks/></div>

      {/* WIDGETS */}
      <div className="fade-up-3" style={{ flexShrink:0, display:"grid", gridTemplateColumns:"1fr 1.4fr 1fr", gap:12, alignItems:"start" }}>
        <TrainingPlanWidget trainingEvents={calData?.trainingEvents||[]} hevyData={hevyData}/>
        <HevyWidget hevyData={hevyData} loading={hevyLoading} error={hevyError} onSetup={()=>setSetupOpen(true)}/>
        <AssessmentsWidget assessments={assessments} loading={calLoading} googleConnected={googleConnected} onConnect={googleConnect} fetchedAt={calData?.fetchedAt}/>
      </div>

      <SetupModal open={setupOpen} onClose={()=>setSetupOpen(false)} onSaveHevy={saveHevySettings} initialHevyKey={hevyKey} initialProxy={hevyProxy}/>
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
